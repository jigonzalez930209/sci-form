[package]
name = "sci-form"
version = "0.1.0"
edition = "2021"
authors = ["Sci-Form Team"]
description = "VeloSci 3D Conformer Engine in Rust"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
petgraph = "0.6.4"
nalgebra = { version = "0.32", features = ["rand"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.8.5"
rayon = "1.7"

[profile.release]
opt-level = "z"
lto = true
strip = true
