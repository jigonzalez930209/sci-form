name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.os }} / ${{ matrix.suite }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            suite: full
          - os: macos-latest
            suite: smoke
          - os: windows-latest
            suite: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit tests
        if: matrix.suite == 'full'
        run: cargo test --lib --release
      - name: Smoke battery
        run: cargo test --release --test ci -- --nocapture

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM (web) with parallelization
        run: cd crates/wasm && wasm-pack build --target web --release --features parallel
      - name: Build WASM (nodejs) without parallelization
        run: cd crates/wasm && wasm-pack build --target nodejs --release --out-dir pkg-node
      - name: Verify Node.js install
        run: cd crates/wasm/pkg-node && node -e "const sci = require('./sci_form_wasm.js'); const r = JSON.parse(sci.embed('CCO', 42)); console.assert(r.num_atoms === 9, 'Expected 9 atoms'); console.log('✓ Node.js WASM works');"
      - uses: actions/upload-artifact@v6
        with:
          name: wasm-pkg
          path: crates/wasm/pkg/

  python:
    name: Python Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - uses: Swatinem/rust-cache@v2
      - name: Install maturin
        run: pip install maturin
      - name: Build wheel
        run: cd crates/python && maturin build --release
      - uses: actions/upload-artifact@v6
        with:
          name: python-wheel-${{ matrix.os }}
          path: target/wheels/*.whl
