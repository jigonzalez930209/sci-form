<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220" width="780" height="220" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="780" height="220" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">E7: Grimme D4 Dispersion Correction</text>
  <text x="390" y="48" text-anchor="middle" font-size="10" fill="#64748b">Geometry-dependent C6/C8 with Becke-Johnson damping</text>

  <!-- Phase boxes -->
  <rect x="10"  y="65" width="140" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80"  y="90"  text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Coord. Numbers</text>
  <text x="80"  y="106" text-anchor="middle" font-size="10" fill="#1d4ed8">CN_A (D4 counting)</text>
  <text x="80"  y="120" text-anchor="middle" font-size="10" fill="#1d4ed8">error function</text>

  <rect x="170" y="65" width="140" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="240" y="90"  text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">C6(CN) Interp</text>
  <text x="240" y="106" text-anchor="middle" font-size="10" fill="#15803d">Reference C6^ref</text>
  <text x="240" y="120" text-anchor="middle" font-size="10" fill="#15803d">Gaussian weights</text>

  <rect x="330" y="65" width="140" height="80" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="90"  text-anchor="middle" font-size="11" font-weight="bold" fill="#713f12">BJ Damping</text>
  <text x="400" y="106" text-anchor="middle" font-size="10" fill="#92400e">f_damp(r, R0_AB)</text>
  <text x="400" y="120" text-anchor="middle" font-size="10" fill="#92400e">a1, a2, s8 params</text>

  <rect x="490" y="65" width="140" height="80" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="560" y="90"  text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d">E_disp</text>
  <text x="560" y="106" text-anchor="middle" font-size="10" fill="#be185d">E2 + E3 body</text>
  <text x="560" y="120" text-anchor="middle" font-size="10" fill="#be185d">−C6/r⁶ − C8/r⁸</text>

  <rect x="650" y="65" width="120" height="80" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="710" y="90"  text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">Augmented FF</text>
  <text x="710" y="106" text-anchor="middle" font-size="10" fill="#6d28d9">EHT-D4</text>
  <text x="710" y="120" text-anchor="middle" font-size="10" fill="#6d28d9">UFF-D4</text>

  <!-- Arrows -->
  <line x1="150" y1="105" x2="168" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="105" x2="328" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="105" x2="488" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="630" y1="105" x2="648" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels -->
  <text x="80"  y="168" text-anchor="middle" font-size="9" fill="#64748b">environment-aware</text>
  <text x="240" y="168" text-anchor="middle" font-size="9" fill="#64748b">DFT-quality coefficients</text>
  <text x="400" y="168" text-anchor="middle" font-size="9" fill="#64748b">rational damping</text>
  <text x="560" y="168" text-anchor="middle" font-size="9" fill="#64748b">2- and 3-body terms</text>
  <text x="710" y="168" text-anchor="middle" font-size="9" fill="#64748b">2.7% overhead</text>

  <!-- Advantage badge -->
  <rect x="180" y="185" width="420" height="24" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="390" y="201" text-anchor="middle" font-size="10" fill="#166534">✓ 36× faster than UFF · DFT-quality London dispersion · Analytical gradient</text>
