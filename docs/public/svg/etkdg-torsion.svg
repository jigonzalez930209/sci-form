<svg viewBox="0 -8 500 188" xmlns="http://www.w3.org/2000/svg" style="max-width:480px;margin:2em auto;display:block;">
  <rect x="0" y="-8" width="500" height="188" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>

  <g font-family="system-ui,sans-serif">
    <!-- Newman projection style -->
    <!-- Anti conformation -->
    <text x="130" y="15" text-anchor="middle" fill="#1e3a5f" font-weight="700" font-size="12">Anti (180°)</text>
    <circle cx="130" cy="90" r="50" fill="none" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="130" cy="90" r="3" fill="#2563eb"/>
    <!-- Back carbon bonds -->
    <line x1="130" y1="90" x2="130" y2="38" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="130" y1="90" x2="82" y2="118" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="130" y1="90" x2="178" y2="118" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Front carbon bonds (offset) -->
    <line x1="130" y1="90" x2="130" y2="142" stroke="#2563eb" stroke-width="2"/>
    <line x1="130" y1="90" x2="82" y2="62" stroke="#2563eb" stroke-width="2"/>
    <line x1="130" y1="90" x2="178" y2="62" stroke="#2563eb" stroke-width="2"/>

    <text x="130" y="160" text-anchor="middle" fill="#10b981" font-weight="600" font-size="11">✓ lowest energy</text>

    <!-- Gauche conformation -->
    <text x="370" y="15" text-anchor="middle" fill="#1e3a5f" font-weight="700" font-size="12">Gauche (60°)</text>
    <circle cx="370" cy="90" r="50" fill="none" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="370" cy="90" r="3" fill="#2563eb"/>
    <!-- Back carbon bonds -->
    <line x1="370" y1="90" x2="370" y2="38" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="370" y1="90" x2="322" y2="118" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="370" y1="90" x2="418" y2="118" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Front (rotated 60°) -->
    <line x1="370" y1="90" x2="413" y2="65" stroke="#2563eb" stroke-width="2"/>
    <line x1="370" y1="90" x2="327" y2="65" stroke="#2563eb" stroke-width="2"/>
    <line x1="370" y1="90" x2="370" y2="142" stroke="#2563eb" stroke-width="2"/>

    <text x="370" y="160" text-anchor="middle" fill="#ca8a04" font-weight="600" font-size="11">local minimum</text>
  </g>
</svg>
