<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;margin:2em auto;display:block;">
  <g font-family="system-ui,sans-serif">
    <!-- Title -->
    <text x="360" y="30" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="700">Density of States (DOS) and PDOS</text>

    <!-- DOS curve illustration -->
    <g transform="translate(40, 60)">
      <!-- Axes -->
      <line x1="30" y1="200" x2="300" y2="200" stroke="#1e293b" stroke-width="1.5"/>
      <line x1="30" y1="200" x2="30" y2="20" stroke="#1e293b" stroke-width="1.5"/>
      <text x="165" y="225" text-anchor="middle" fill="#64748b" font-size="11">Energy (eV)</text>
      <text x="10" y="110" text-anchor="middle" fill="#64748b" font-size="11" transform="rotate(-90, 10, 110)">DOS</text>

      <!-- Discrete eigenvalues (sticks) -->
      <line x1="70" y1="200" x2="70" y2="160" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
      <line x1="100" y1="200" x2="100" y2="140" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
      <line x1="130" y1="200" x2="130" y2="150" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
      <line x1="180" y1="200" x2="180" y2="130" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
      <line x1="220" y1="200" x2="220" y2="165" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
      <line x1="260" y1="200" x2="260" y2="170" stroke="#6366f1" stroke-width="2" opacity="0.5"/>

      <!-- Gaussian-smeared curve -->
      <path d="M 40,198 C 50,196 55,180 70,155 C 80,140 85,135 100,120 C 110,130 115,140 130,135 C 140,130 155,160 165,170 C 170,165 175,140 180,110 C 185,130 195,160 210,165 C 215,160 220,148 225,155 C 235,160 250,165 260,158 C 275,170 285,190 295,198" fill="none" stroke="#2563eb" stroke-width="2.5"/>

      <!-- PDOS fill (atom contribution) -->
      <path d="M 40,198 C 50,197 55,188 70,175 C 80,165 85,160 100,155 C 110,162 115,168 130,165 C 140,162 155,180 165,185 C 170,182 175,168 180,155 C 185,165 195,180 210,183 C 215,180 220,175 225,178 C 235,182 250,185 260,180 C 275,188 285,195 295,198 Z" fill="#2563eb" opacity="0.15"/>

      <!-- Legend -->
      <line x1="40" y1="240" x2="60" y2="240" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
      <text x="68" y="244" fill="#64748b" font-size="10">eigenvalue sticks</text>
      <line x1="140" y1="240" x2="160" y2="240" stroke="#2563eb" stroke-width="2.5"/>
      <text x="168" y="244" fill="#64748b" font-size="10">smeared DOS</text>
      <rect x="240" y="235" width="15" height="10" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="0.5"/>
      <text x="262" y="244" fill="#64748b" font-size="10">PDOS (atom)</text>
    </g>

    <!-- Formula section -->
    <rect x="370" y="60" width="330" height="210" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>

    <text x="390" y="88" fill="#3730a3" font-weight="700" font-size="14">Gaussian Smearing</text>

    <text x="390" y="115" fill="#1e293b" font-size="12" font-weight="600">Total DOS:</text>
    <text x="390" y="138" fill="#312e81" font-size="12" font-weight="600">D(E) = Σᵢ G(E − εᵢ, σ)</text>

    <text x="390" y="165" fill="#1e293b" font-size="12" font-weight="600">Gaussian kernel:</text>
    <text x="390" y="188" fill="#312e81" font-size="12" font-weight="600">G(x,σ) = 1/(σ√2π) · e^(−x²/2σ²)</text>

    <text x="390" y="215" fill="#1e293b" font-size="12" font-weight="600">PDOS for atom A:</text>
    <text x="390" y="238" fill="#312e81" font-size="12" font-weight="600">Dₐ(E) = Σᵢ wₐᵢ · G(E − εᵢ, σ)</text>
    <text x="390" y="258" fill="#64748b" font-size="11">wₐᵢ = Σᵤ∈ₐ |Cᵤᵢ|² (Mulliken weight)</text>

    <!-- Properties -->
    <rect x="40" y="310" width="660" height="70" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="60" y="335" fill="#3730a3" font-weight="700" font-size="13">Parameters</text>
    <text x="60" y="355" fill="#64748b" font-size="12">σ (smearing width): 0.1–0.5 eV typical | grid_points: 500–2000 | Σₐ Dₐ(E) = D(E) (PDOS sums to total)</text>
    <text x="60" y="372" fill="#64748b" font-size="12">∫ D(E) dE ≈ N_orbitals | narrower σ → sharper peaks near eigenvalues</text>
  </g>
</svg>
