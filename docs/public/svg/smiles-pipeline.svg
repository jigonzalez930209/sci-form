<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg" style="max-width:660px;margin:2em auto;display:block;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
  </defs>
  <g font-family="system-ui,sans-serif">
    <!-- SMILES string -->
    <rect x="10" y="60" width="140" height="60" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="80" y="85" text-anchor="middle" fill="#1e3a5f" font-weight="600" font-size="13">SMILES String</text>
    <text x="80" y="105" text-anchor="middle" fill="#2563eb" font-family="monospace" font-size="14">"c1ccccc1O"</text>

    <!-- Arrow 1 -->
    <line x1="155" y1="90" x2="195" y2="90" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Tokenizer -->
    <rect x="200" y="60" width="140" height="60" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
    <text x="270" y="85" text-anchor="middle" fill="#334155" font-weight="600" font-size="13">Tokenizer</text>
    <text x="270" y="105" text-anchor="middle" fill="#64748b" font-size="11">atoms, bonds, rings</text>

    <!-- Arrow 2 -->
    <line x1="345" y1="90" x2="385" y2="90" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Graph Builder -->
    <rect x="390" y="60" width="140" height="60" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
    <text x="460" y="85" text-anchor="middle" fill="#334155" font-weight="600" font-size="13">Graph Builder</text>
    <text x="460" y="105" text-anchor="middle" fill="#64748b" font-size="11">petgraph + H addition</text>

    <!-- Arrow 3 -->
    <line x1="535" y1="90" x2="575" y2="90" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Molecule -->
    <rect x="580" y="60" width="110" height="60" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
    <text x="635" y="85" text-anchor="middle" fill="#14532d" font-weight="600" font-size="13">Molecule</text>
    <text x="635" y="105" text-anchor="middle" fill="#64748b" font-size="11">atoms + bonds + rings</text>
  </g>
</svg>
