<svg viewBox="0 0 550 250" xmlns="http://www.w3.org/2000/svg" style="max-width:520px;margin:2em auto;display:block;">
  <g font-family="system-ui,sans-serif">
    <!-- Axes -->
    <line x1="80" y1="200" x2="500" y2="200" stroke="#94a3b8" stroke-width="1"/>
    <line x1="80" y1="200" x2="80" y2="20" stroke="#94a3b8" stroke-width="1"/>

    <!-- E label -->
    <text x="70" y="15" text-anchor="end" fill="#334155" font-weight="600" font-size="12">E</text>
    <!-- d label -->
    <text x="510" y="205" fill="#334155" font-weight="600" font-size="12">d</text>

    <!-- Lower bound region -->
    <path d="M 80 80 Q 120 195 170 200" fill="none" stroke="#ef4444" stroke-width="2.5"/>

    <!-- Flat region -->
    <line x1="170" y1="200" x2="350" y2="200" stroke="#10b981" stroke-width="2.5"/>

    <!-- Upper bound region -->
    <path d="M 350 200 Q 400 195 480 80" fill="none" stroke="#ef4444" stroke-width="2.5"/>

    <!-- l and u markers -->
    <line x1="170" y1="195" x2="170" y2="210" stroke="#2563eb" stroke-width="1.5"/>
    <text x="170" y="225" text-anchor="middle" fill="#2563eb" font-weight="600" font-size="12">l_ij</text>

    <line x1="350" y1="195" x2="350" y2="210" stroke="#2563eb" stroke-width="1.5"/>
    <text x="350" y="225" text-anchor="middle" fill="#2563eb" font-weight="600" font-size="12">u_ij</text>

    <!-- Labels -->
    <text x="265" y="190" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600">E = 0</text>
    <text x="130" y="60" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">too close</text>
    <text x="450" y="60" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">too far</text>
  </g>
</svg>
