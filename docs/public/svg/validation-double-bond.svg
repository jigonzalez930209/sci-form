<svg viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg" style="max-width:480px;margin:2em auto;display:block;">
  <g font-family="system-ui,sans-serif">
    <!-- Good double bond (left) -->
    <text x="120" y="15" text-anchor="middle" fill="#14532d" font-weight="700" font-size="12">✓ Valid</text>

    <circle cx="90" cy="90" r="8" fill="#2563eb"/>
    <circle cx="160" cy="90" r="8" fill="#2563eb"/>
    <line x1="90" y1="85" x2="160" y2="85" stroke="#2563eb" stroke-width="2"/>
    <line x1="90" y1="95" x2="160" y2="95" stroke="#2563eb" stroke-width="2"/>

    <!-- Substituents at proper angles -->
    <line x1="82" y1="90" x2="50" y2="55" stroke="#10b981" stroke-width="1.5"/>
    <line x1="82" y1="90" x2="50" y2="125" stroke="#10b981" stroke-width="1.5"/>
    <line x1="168" y1="90" x2="200" y2="55" stroke="#10b981" stroke-width="1.5"/>
    <line x1="168" y1="90" x2="200" y2="125" stroke="#10b981" stroke-width="1.5"/>

    <circle cx="50" cy="55" r="4" fill="#10b981"/>
    <circle cx="50" cy="125" r="4" fill="#10b981"/>
    <circle cx="200" cy="55" r="4" fill="#10b981"/>
    <circle cx="200" cy="125" r="4" fill="#10b981"/>

    <text x="120" y="160" text-anchor="middle" fill="#10b981" font-size="10">~120° angles</text>

    <!-- Bad double bond (right) -->
    <text x="380" y="15" text-anchor="middle" fill="#991b1b" font-weight="700" font-size="12">✗ Invalid</text>

    <circle cx="340" cy="90" r="8" fill="#94a3b8"/>
    <circle cx="410" cy="90" r="8" fill="#94a3b8"/>
    <line x1="340" y1="85" x2="410" y2="85" stroke="#94a3b8" stroke-width="2"/>
    <line x1="340" y1="95" x2="410" y2="95" stroke="#94a3b8" stroke-width="2"/>

    <!-- Substituent nearly linear -->
    <line x1="332" y1="90" x2="290" y2="90" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="332" y1="90" x2="310" y2="130" stroke="#94a3b8" stroke-width="1"/>
    <line x1="418" y1="90" x2="460" y2="90" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="418" y1="90" x2="440" y2="55" stroke="#94a3b8" stroke-width="1"/>

    <circle cx="290" cy="90" r="4" fill="#ef4444"/>
    <circle cx="460" cy="90" r="4" fill="#ef4444"/>
    <circle cx="310" cy="130" r="4" fill="#94a3b8"/>
    <circle cx="440" cy="55" r="4" fill="#94a3b8"/>

    <text x="380" y="160" text-anchor="middle" fill="#ef4444" font-size="10">~180° = collinear → reject</text>
  </g>
</svg>
