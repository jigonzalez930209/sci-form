<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" style="margin:2em auto;display:block;">
  <defs>
    <marker id="kabArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="420" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>


  <g font-family="system-ui,sans-serif">
    <!-- Title -->
    <text x="360" y="30" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="700">Kabsch Algorithm — Optimal 3D Alignment</text>

    <!-- Before alignment -->
    <g transform="translate(115, 170)">
      <text x="0" y="-65" text-anchor="middle" fill="#64748b" font-size="12" font-weight="600">Before Alignment</text>

      <!-- Molecule P (blue) -->
      <circle cx="-40" cy="-20" r="8" fill="#3b82f6" opacity="0.7"/>
      <circle cx="0" cy="-40" r="8" fill="#3b82f6" opacity="0.7"/>
      <circle cx="30" cy="10" r="8" fill="#3b82f6" opacity="0.7"/>
      <circle cx="-10" cy="30" r="8" fill="#3b82f6" opacity="0.7"/>
      <line x1="-40" y1="-20" x2="0" y2="-40" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
      <line x1="0" y1="-40" x2="30" y2="10" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
      <line x1="30" y1="10" x2="-10" y2="30" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>

      <!-- Molecule Q (red, rotated) -->
      <circle cx="10" cy="-35" r="8" fill="#ef4444" opacity="0.7"/>
      <circle cx="40" cy="-10" r="8" fill="#ef4444" opacity="0.7"/>
      <circle cx="20" cy="35" r="8" fill="#ef4444" opacity="0.7"/>
      <circle cx="-30" cy="15" r="8" fill="#ef4444" opacity="0.7"/>
      <line x1="10" y1="-35" x2="40" y2="-10" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
      <line x1="40" y1="-10" x2="20" y2="35" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
      <line x1="20" y1="35" x2="-30" y2="15" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>

      <!-- Legend -->
      <circle cx="-50" cy="60" r="5" fill="#3b82f6"/>
      <text x="-40" y="64" fill="#64748b" font-size="10">Reference P</text>
      <circle cx="20" cy="60" r="5" fill="#ef4444"/>
      <text x="30" y="64" fill="#64748b" font-size="10">Target Q</text>
    </g>

    <!-- Arrow -->
    <line x1="225" y1="165" x2="280" y2="165" stroke="#d97706" stroke-width="2" marker-end="url(#kabArrow)"/>
    <text x="253" y="155" text-anchor="middle" fill="#d97706" font-size="11" font-weight="600">SVD</text>

    <!-- After alignment -->
    <g transform="translate(395, 170)">
      <text x="0" y="-65" text-anchor="middle" fill="#64748b" font-size="12" font-weight="600">After Alignment</text>

      <!-- Overlapped molecules -->
      <circle cx="-35" cy="-25" r="8" fill="#3b82f6" opacity="0.5"/>
      <circle cx="-33" cy="-23" r="8" fill="#ef4444" opacity="0.5"/>

      <circle cx="5" cy="-40" r="8" fill="#3b82f6" opacity="0.5"/>
      <circle cx="7" cy="-38" r="8" fill="#ef4444" opacity="0.5"/>

      <circle cx="30" cy="15" r="8" fill="#3b82f6" opacity="0.5"/>
      <circle cx="28" cy="13" r="8" fill="#ef4444" opacity="0.5"/>

      <circle cx="-15" cy="30" r="8" fill="#3b82f6" opacity="0.5"/>
      <circle cx="-13" cy="28" r="8" fill="#ef4444" opacity="0.5"/>

      <text x="0" y="60" text-anchor="middle" fill="#059669" font-size="11" font-weight="600">RMSD = 0.12 Å</text>
    </g>

    <!-- Algorithm steps -->
    <rect x="20" y="250" width="680" height="150" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>

    <text x="40" y="278" fill="#92400e" font-weight="700" font-size="14">Kabsch SVD Pipeline</text>

    <!-- Step 1 -->
    <circle cx="50" cy="300" r="10" fill="#d97706"/>
    <text x="50" y="304" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1</text>
    <text x="68" y="304" fill="#1e293b" font-size="12" font-weight="600">Center both structures:</text>
    <text x="260" y="304" fill="#64748b" font-size="12">P̄ = P − centroid(P),   Q̄ = Q − centroid(Q)</text>

    <!-- Step 2 -->
    <circle cx="50" cy="328" r="10" fill="#d97706"/>
    <text x="50" y="332" text-anchor="middle" fill="white" font-size="10" font-weight="bold">2</text>
    <text x="68" y="332" fill="#1e293b" font-size="12" font-weight="600">Cross-covariance → SVD:</text>
    <text x="265" y="332" fill="#64748b" font-size="12">H = P̄ᵀQ̄,   SVD(H) = UΣVᵀ</text>

    <!-- Step 3 -->
    <circle cx="50" cy="356" r="10" fill="#d97706"/>
    <text x="50" y="360" text-anchor="middle" fill="white" font-size="10" font-weight="bold">3</text>
    <text x="68" y="360" fill="#1e293b" font-size="12" font-weight="600">Optimal rotation:</text>
    <text x="212" y="360" fill="#64748b" font-size="12">d = sign(det(VUᵀ)),   R = V·diag(1,1,d)·Uᵀ</text>

    <!-- Step 4 -->
    <circle cx="50" cy="384" r="10" fill="#d97706"/>
    <text x="50" y="388" text-anchor="middle" fill="white" font-size="10" font-weight="bold">4</text>
    <text x="68" y="388" fill="#1e293b" font-size="12" font-weight="600">RMSD:</text>
    <text x="120" y="388" fill="#64748b" font-size="12">RMSD = √(Σᵢ |R·P̄ᵢ − Q̄ᵢ|² / N)</text>
  </g>
</svg>
