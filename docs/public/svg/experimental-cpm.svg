<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220" width="780" height="220" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="780" height="220" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">E10: Constant Potential Method (CPM)</text>
  <text x="390" y="48" text-anchor="middle" font-size="10" fill="#64748b">Electrochemical properties at fixed electrode potential μ</text>

  <!-- Phase boxes -->
  <rect x="10"  y="65" width="140" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80"  y="90"  text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">EEQ Setup</text>
  <text x="80"  y="106" text-anchor="middle" font-size="10" fill="#1d4ed8">χ, η, Coulomb</text>
  <text x="80"  y="120" text-anchor="middle" font-size="10" fill="#1d4ed8">from geometry</text>

  <rect x="170" y="65" width="140" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="240" y="90"  text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Fix Potential μ</text>
  <text x="240" y="106" text-anchor="middle" font-size="10" fill="#15803d">Grand canonical</text>
  <text x="240" y="120" text-anchor="middle" font-size="10" fill="#15803d">Σq ≠ 0 allowed</text>

  <rect x="330" y="65" width="140" height="80" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="90"  text-anchor="middle" font-size="11" font-weight="bold" fill="#713f12">Charge Equil</text>
  <text x="400" y="106" text-anchor="middle" font-size="10" fill="#92400e">A·q = −(χ − μ)</text>
  <text x="400" y="120" text-anchor="middle" font-size="10" fill="#92400e">converge q(μ)</text>

  <rect x="490" y="65" width="140" height="80" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="560" y="90"  text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d">Grand Potential</text>
  <text x="560" y="106" text-anchor="middle" font-size="10" fill="#be185d">Ω = E − μN</text>
  <text x="560" y="120" text-anchor="middle" font-size="10" fill="#be185d">free energy</text>

  <rect x="650" y="65" width="120" height="80" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="710" y="90"  text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">Surface Scan</text>
  <text x="710" y="106" text-anchor="middle" font-size="10" fill="#6d28d9">Q(μ), C(μ)</text>
  <text x="710" y="120" text-anchor="middle" font-size="10" fill="#6d28d9">capacitance</text>

  <!-- Arrows -->
  <line x1="150" y1="105" x2="168" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="105" x2="328" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="105" x2="488" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="630" y1="105" x2="648" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels -->
  <text x="80"  y="168" text-anchor="middle" font-size="9" fill="#64748b">charge equilibration</text>
  <text x="240" y="168" text-anchor="middle" font-size="9" fill="#64748b">electrode coupling</text>
  <text x="400" y="168" text-anchor="middle" font-size="9" fill="#64748b">non-neutral solution</text>
  <text x="560" y="168" text-anchor="middle" font-size="9" fill="#64748b">thermodynamic potential</text>
  <text x="710" y="168" text-anchor="middle" font-size="9" fill="#64748b">μ-sweep analysis</text>

  <!-- Advantage badge -->
  <rect x="180" y="185" width="420" height="24" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="390" y="201" text-anchor="middle" font-size="10" fill="#166534">✓ Variable electron count · Quantum capacitance · Voltage-dependent ranking</text>
</svg>
