<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;margin:2em auto;display:block;">
  <rect x="0" y="0" width="720" height="380" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>

  <g font-family="system-ui,sans-serif">
    <!-- Title -->
    <text x="360" y="30" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="700">Arrow Columnar Memory Layout</text>

    <!-- Row-oriented (before) -->
    <rect x="20" y="55" width="300" height="150" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
    <text x="170" y="78" text-anchor="middle" fill="#991b1b" font-weight="700" font-size="13">Row-Oriented (JSON)</text>

    <g transform="translate(40, 90)" font-size="11">
      <rect x="0" y="0" width="260" height="22" rx="3" fill="#fee2e2"/>
      <text x="5" y="15" fill="#7f1d1d">{"x": 1.2, "y": 3.4, "z": 0.1, "q": -0.3}</text>
      <rect x="0" y="26" width="260" height="22" rx="3" fill="#fee2e2"/>
      <text x="5" y="41" fill="#7f1d1d">{"x": 2.5, "y": 1.1, "z": 4.2, "q": 0.17}</text>
      <rect x="0" y="52" width="260" height="22" rx="3" fill="#fee2e2"/>
      <text x="5" y="67" fill="#7f1d1d">{"x": 0.8, "y": 2.9, "z": 3.1, "q": 0.13}</text>
      <text x="130" y="90" text-anchor="middle" fill="#dc2626" font-size="10">scattered memory access ✗</text>
    </g>

    <!-- Arrow (transformation) -->
    <text x="350" y="138" text-anchor="middle" fill="#7c3aed" font-size="22" font-weight="700">→</text>

    <!-- Column-oriented (after) -->
    <rect x="400" y="55" width="300" height="150" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <text x="550" y="78" text-anchor="middle" fill="#065f46" font-weight="700" font-size="13">Column-Oriented (Arrow)</text>

    <g transform="translate(415, 90)" font-size="11">
      <rect x="0" y="0" width="270" height="18" rx="3" fill="#dcfce7"/>
      <text x="5" y="13" fill="#14532d" font-weight="600">x:</text>
      <text x="20" y="13" fill="#166534">[1.2, 2.5, 0.8, ...]  Float64Array</text>

      <rect x="0" y="22" width="270" height="18" rx="3" fill="#dcfce7"/>
      <text x="5" y="35" fill="#14532d" font-weight="600">y:</text>
      <text x="20" y="35" fill="#166534">[3.4, 1.1, 2.9, ...]  Float64Array</text>

      <rect x="0" y="44" width="270" height="18" rx="3" fill="#dcfce7"/>
      <text x="5" y="57" fill="#14532d" font-weight="600">z:</text>
      <text x="20" y="57" fill="#166534">[0.1, 4.2, 3.1, ...]  Float64Array</text>

      <rect x="0" y="66" width="270" height="18" rx="3" fill="#dcfce7"/>
      <text x="5" y="79" fill="#14532d" font-weight="600">q:</text>
      <text x="20" y="79" fill="#166534">[-0.3, 0.17, 0.13, ...] Float64Array</text>

      <text x="135" y="100" text-anchor="middle" fill="#059669" font-size="10">contiguous memory, SIMD-friendly ✓</text>
    </g>

    <!-- Benefits section -->
    <rect x="20" y="225" width="680" height="55" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="40" y="248" fill="#3730a3" font-weight="700" font-size="13">RecordBatch Structure</text>
    <text x="40" y="268" fill="#64748b" font-size="12">columns: Vec&lt;Column&gt; (Float64 | Int32 | Uint8) + schema: Vec&lt;ColumnSchema&gt; (name + dtype)</text>

    <!-- Pack functions -->
    <rect x="20" y="295" width="680" height="70" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
    <text x="40" y="318" fill="#3730a3" font-weight="700" font-size="13">Pack Functions</text>
    <text x="40" y="338" fill="#64748b" font-size="12">pack_conformers(results) → RecordBatch with x, y, z, energy, element columns</text>
    <text x="40" y="355" fill="#64748b" font-size="12">pack_esp_grid(grid) → RecordBatch with ESP values + grid metadata</text>
  </g>
</svg>
