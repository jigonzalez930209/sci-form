<svg viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;margin:2em auto;display:block;">
  <g font-family="system-ui,sans-serif">
    <!-- Title -->
    <text x="360" y="30" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="700">UFF Energy Terms</text>

    <!-- Bond Stretch -->
    <rect x="20" y="55" width="320" height="95" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
    <circle cx="44" cy="75" r="14" fill="#22c55e"/>
    <text x="44" y="79" text-anchor="middle" fill="white" font-weight="700" font-size="11">1</text>
    <text x="66" y="79" fill="#14532d" font-weight="700" font-size="13">Bond Stretch (Harmonic)</text>
    <text x="40" y="103" fill="#166534" font-size="12" font-weight="600">E_stretch = ½ kᵢⱼ (r − r₀)²</text>
    <text x="40" y="123" fill="#64748b" font-size="11">kᵢⱼ = 664.12 · Zᵢ*Zⱼ / r₀³   (kcal/mol/Å²)</text>
    <text x="40" y="140" fill="#94a3b8" font-size="10">r₀ = rᵢ + rⱼ − rᵢⱼ(EN) − rᵢⱼ(BO)</text>

    <!-- Angle Bend -->
    <rect x="380" y="55" width="320" height="95" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="404" cy="75" r="14" fill="#3b82f6"/>
    <text x="404" y="79" text-anchor="middle" fill="white" font-weight="700" font-size="11">2</text>
    <text x="426" y="79" fill="#1e3a8a" font-weight="700" font-size="13">Angle Bend (Cosine)</text>
    <text x="400" y="103" fill="#1d4ed8" font-size="12" font-weight="600">E_bend = kθ (C₀ + C₁cosθ + C₂cos2θ)</text>
    <text x="400" y="123" fill="#64748b" font-size="11">kθ = 664.12 · Z₁Z₃ / r₁₃⁵ · expansion</text>
    <text x="400" y="140" fill="#94a3b8" font-size="10">C₀,C₁,C₂ from natural angle θ₀</text>

    <!-- Torsion -->
    <rect x="20" y="175" width="320" height="95" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="44" cy="195" r="14" fill="#8b5cf6"/>
    <text x="44" y="199" text-anchor="middle" fill="white" font-weight="700" font-size="11">3</text>
    <text x="66" y="199" fill="#4c1d95" font-weight="700" font-size="13">Torsion (Fourier)</text>
    <text x="40" y="223" fill="#6d28d9" font-size="12" font-weight="600">E_torsion = ½ Vφ (1 − cos(nφ₀)·cos(nφ))</text>
    <text x="40" y="243" fill="#64748b" font-size="11">n = periodicity, Vφ = barrier height</text>
    <text x="40" y="260" fill="#94a3b8" font-size="10">sp3-sp3: n=3, sp2-sp2: n=2</text>

    <!-- van der Waals -->
    <rect x="380" y="175" width="320" height="95" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
    <circle cx="404" cy="195" r="14" fill="#f97316"/>
    <text x="404" y="199" text-anchor="middle" fill="white" font-weight="700" font-size="11">4</text>
    <text x="426" y="199" fill="#7c2d12" font-weight="700" font-size="13">van der Waals (LJ 12-6)</text>
    <text x="400" y="223" fill="#c2410c" font-size="12" font-weight="600">E_vdw = εᵢⱼ [(xᵢⱼ/r)¹² − 2(xᵢⱼ/r)⁶]</text>
    <text x="400" y="243" fill="#64748b" font-size="11">xᵢⱼ = √(xᵢxⱼ),  εᵢⱼ = √(εᵢεⱼ)</text>
    <text x="400" y="260" fill="#94a3b8" font-size="10">geometric combining rules</text>

    <!-- Inversion / OOP -->
    <rect x="20" y="295" width="320" height="95" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="44" cy="315" r="14" fill="#ef4444"/>
    <text x="44" y="319" text-anchor="middle" fill="white" font-weight="700" font-size="11">5</text>
    <text x="66" y="319" fill="#7f1d1d" font-weight="700" font-size="13">Inversion (Out-of-Plane)</text>
    <text x="40" y="343" fill="#dc2626" font-size="12" font-weight="600">E_oop = kω (C₀ + C₁cosω + C₂cos2ω)</text>
    <text x="40" y="363" fill="#64748b" font-size="11">ω = angle from plane of three neighbors</text>
    <text x="40" y="380" fill="#94a3b8" font-size="10">sp2 centers: ω₀ = 0°, planar preferred</text>

    <!-- Coulomb -->
    <rect x="380" y="295" width="320" height="95" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.5"/>
    <circle cx="404" cy="315" r="14" fill="#06b6d4"/>
    <text x="404" y="319" text-anchor="middle" fill="white" font-weight="700" font-size="11">6</text>
    <text x="426" y="319" fill="#164e63" font-weight="700" font-size="13">Electrostatic (Coulomb)</text>
    <text x="400" y="343" fill="#0891b2" font-size="12" font-weight="600">E_elec = 332.0637 · qᵢqⱼ / (ε·rᵢⱼ)</text>
    <text x="400" y="363" fill="#64748b" font-size="11">qᵢ = partial charges (from EHT)</text>
    <text x="400" y="380" fill="#94a3b8" font-size="10">ε = dielectric constant</text>

    <!-- Total energy -->
    <rect x="20" y="415" width="680" height="60" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="360" y="442" text-anchor="middle" fill="#1e293b" font-weight="700" font-size="14">Total Energy</text>
    <text x="360" y="463" text-anchor="middle" fill="#334155" font-size="13" font-weight="600">E_total = E_stretch + E_bend + E_torsion + E_vdw + E_oop + E_elec</text>
  </g>
</svg>
