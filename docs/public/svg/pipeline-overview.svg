<svg viewBox="0 0 800 580" xmlns="http://www.w3.org/2000/svg" style="max-width:720px;margin:2em auto;display:block;">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Step boxes -->
  <g font-family="system-ui,sans-serif" font-size="13">
    <!-- Step 1 -->
    <rect x="20" y="10" width="220" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="40" cy="35" r="12" fill="#2563eb"/>
    <text x="40" y="39" text-anchor="middle" fill="white" font-weight="bold" font-size="11">1</text>
    <text x="60" y="30" fill="#1e3a5f" font-weight="600">SMILES Parsing</text>
    <text x="60" y="46" fill="#64748b" font-size="11">String → molecular graph</text>

    <!-- Step 2 -->
    <rect x="280" y="10" width="220" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="300" cy="35" r="12" fill="#2563eb"/>
    <text x="300" y="39" text-anchor="middle" fill="white" font-weight="bold" font-size="11">2</text>
    <text x="320" y="30" fill="#1e3a5f" font-weight="600">Bounds Matrix</text>
    <text x="320" y="46" fill="#64748b" font-size="11">1-2, 1-3, 1-4, VDW bounds</text>

    <!-- Step 3 -->
    <rect x="540" y="10" width="220" height="50" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="560" cy="35" r="12" fill="#2563eb"/>
    <text x="560" y="39" text-anchor="middle" fill="white" font-weight="bold" font-size="11">3</text>
    <text x="580" y="30" fill="#1e3a5f" font-weight="600">Triangle Smoothing</text>
    <text x="580" y="46" fill="#64748b" font-size="11">Floyd-Warshall enforcement</text>

    <!-- Step 4 -->
    <rect x="20" y="130" width="220" height="50" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="40" cy="155" r="12" fill="#10b981"/>
    <text x="40" y="159" text-anchor="middle" fill="white" font-weight="bold" font-size="11">4</text>
    <text x="60" y="150" fill="#14532d" font-weight="600">Distance Picking</text>
    <text x="60" y="166" fill="#64748b" font-size="11">Random d ∈ [lower, upper]</text>

    <!-- Step 5 -->
    <rect x="280" y="130" width="220" height="50" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="300" cy="155" r="12" fill="#10b981"/>
    <text x="300" y="159" text-anchor="middle" fill="white" font-weight="bold" font-size="11">5</text>
    <text x="320" y="150" fill="#14532d" font-weight="600">Metric Matrix Embedding</text>
    <text x="320" y="166" fill="#64748b" font-size="11">Eigendecomposition → 4D</text>

    <!-- Step 6 -->
    <rect x="540" y="130" width="220" height="50" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="560" cy="155" r="12" fill="#10b981"/>
    <text x="560" y="159" text-anchor="middle" fill="white" font-weight="bold" font-size="11">6</text>
    <text x="580" y="150" fill="#14532d" font-weight="600">Bounds FF (BFGS)</text>
    <text x="580" y="166" fill="#64748b" font-size="11">4D distance violation min.</text>

    <!-- Step 7 -->
    <rect x="20" y="250" width="220" height="50" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
    <circle cx="40" cy="275" r="12" fill="#ca8a04"/>
    <text x="40" y="279" text-anchor="middle" fill="white" font-weight="bold" font-size="11">7</text>
    <text x="60" y="270" fill="#713f12" font-weight="600">Project to 3D</text>
    <text x="60" y="286" fill="#64748b" font-size="11">Drop 4th dimension</text>

    <!-- Step 8 -->
    <rect x="280" y="250" width="220" height="50" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
    <circle cx="300" cy="275" r="12" fill="#ca8a04"/>
    <text x="300" y="279" text-anchor="middle" fill="white" font-weight="bold" font-size="11">8</text>
    <text x="320" y="270" fill="#713f12" font-weight="600">ETKDG 3D Refinement</text>
    <text x="320" y="286" fill="#64748b" font-size="11">CSD torsions + BFGS</text>

    <!-- Step 9 -->
    <rect x="540" y="250" width="220" height="50" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
    <circle cx="560" cy="275" r="12" fill="#ca8a04"/>
    <text x="560" y="279" text-anchor="middle" fill="white" font-weight="bold" font-size="11">9</text>
    <text x="580" y="270" fill="#713f12" font-weight="600">Validation</text>
    <text x="580" y="286" fill="#64748b" font-size="11">Tetrahedral, planar, E/Z</text>

    <!-- Arrows row 1 -->
    <line x1="240" y1="35" x2="278" y2="35" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="35" x2="538" y2="35" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Arrows row 1→2 -->
    <path d="M 650 60 L 650 90 L 130 90 L 130 128" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- Arrows row 2 -->
    <line x1="240" y1="155" x2="278" y2="155" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="155" x2="538" y2="155" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Arrows row 2→3 -->
    <path d="M 650 180 L 650 210 L 130 210 L 130 248" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

    <!-- Arrows row 3 -->
    <line x1="240" y1="275" x2="278" y2="275" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="500" y1="275" x2="538" y2="275" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arrow)"/>

    <!-- Retry loop -->
    <rect x="20" y="340" width="740" height="40" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 3"/>
    <text x="400" y="365" text-anchor="middle" fill="#991b1b" font-weight="600">
      ← Retry loop: if validation fails at steps 3–9, return to step 4 with next RNG seed (max 10N attempts)
    </text>

    <!-- Output -->
    <rect x="250" y="420" width="300" height="50" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
    <text x="400" y="450" text-anchor="middle" fill="#14532d" font-weight="700" font-size="15">3D Coordinates (N × 3)</text>
    <line x1="400" y1="380" x2="400" y2="418" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Labels -->
    <text x="20" y="510" fill="#64748b" font-size="11">Blue: Topology → Bounds</text>
    <text x="280" y="510" fill="#64748b" font-size="11">Green: Embedding → Optimization</text>
    <text x="540" y="510" fill="#64748b" font-size="11">Yellow: Refinement → Output</text>
  </g>
</svg>
