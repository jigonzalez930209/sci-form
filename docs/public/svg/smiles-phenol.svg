<svg viewBox="0 0 400 262" xmlns="http://www.w3.org/2000/svg" style="max-width:380px;margin:2em auto;display:block;">
  <g font-family="system-ui,sans-serif">
    <!-- Benzene ring -->
    <line x1="200" y1="40" x2="260" y2="75" stroke="#2563eb" stroke-width="2"/>
    <line x1="260" y1="75" x2="260" y2="145" stroke="#2563eb" stroke-width="2"/>
    <line x1="260" y1="145" x2="200" y2="180" stroke="#2563eb" stroke-width="2"/>
    <line x1="200" y1="180" x2="140" y2="145" stroke="#2563eb" stroke-width="2"/>
    <line x1="140" y1="145" x2="140" y2="75" stroke="#2563eb" stroke-width="2"/>
    <line x1="140" y1="75" x2="200" y2="40" stroke="#2563eb" stroke-width="2"/>

    <!-- Inner dashed circle for aromaticity -->
    <circle cx="200" cy="110" r="35" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

    <!-- OH group -->
    <line x1="200" y1="180" x2="200" y2="230" stroke="#ef4444" stroke-width="2"/>
    <circle cx="200" cy="235" r="14" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="200" y="240" text-anchor="middle" fill="#ef4444" font-weight="bold" font-size="13">OH</text>

    <!-- Carbon atoms -->
    <circle cx="200" cy="40" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="200" y="44" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="11">C</text>

    <circle cx="260" cy="75" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="260" y="79" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="11">C</text>

    <circle cx="260" cy="145" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="260" y="149" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="11">C</text>

    <circle cx="200" cy="180" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="200" y="184" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="11">C</text>

    <circle cx="140" cy="145" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="140" y="149" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="11">C</text>

    <circle cx="140" cy="75" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="140" y="79" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="11">C</text>

    <!-- Labels -->
    <text x="15" y="110" fill="#64748b" font-size="12" font-style="italic">6 aromatic C (SP2)</text>
    <text x="15" y="130" fill="#64748b" font-size="12" font-style="italic">1 O (SP3)</text>
    <text x="15" y="150" fill="#64748b" font-size="12" font-style="italic">+ 6 implicit H</text>
    <text x="15" y="170" fill="#64748b" font-size="12" font-style="italic">= 13 total atoms</text>
  </g>
</svg>
