<svg viewBox="0 0 650 280" xmlns="http://www.w3.org/2000/svg" style="max-width:620px;margin:2em auto;display:block;">
  <defs>
    <marker id="varr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="rdarr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="650" height="280" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>

  <g font-family="system-ui,sans-serif" font-size="12">
    <!-- Input -->
    <rect x="10" y="10" width="120" height="40" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="70" y="35" text-anchor="middle" fill="#1e3a5f" font-weight="600">3D Coords</text>

    <!-- Arrow -->
    <line x1="135" y1="30" x2="165" y2="30" stroke="#2563eb" stroke-width="1.5" marker-end="url(#varr)"/>

    <!-- Check 1: Energy -->
    <rect x="170" y="10" width="120" height="40" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="230" y="28" text-anchor="middle" fill="#713f12" font-weight="600" font-size="11">Energy/Atom</text>
    <text x="230" y="42" text-anchor="middle" fill="#64748b" font-size="9">E/N &lt; 0.05</text>

    <line x1="295" y1="30" x2="325" y2="30" stroke="#2563eb" stroke-width="1.5" marker-end="url(#varr)"/>

    <!-- Check 2: Tetrahedral -->
    <rect x="330" y="10" width="120" height="40" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="390" y="28" text-anchor="middle" fill="#713f12" font-weight="600" font-size="11">Tetrahedral</text>
    <text x="390" y="42" text-anchor="middle" fill="#64748b" font-size="9">Volume &gt; 0.50</text>

    <line x1="455" y1="30" x2="485" y2="30" stroke="#2563eb" stroke-width="1.5" marker-end="url(#varr)"/>

    <!-- Check 3: Chiral -->
    <rect x="490" y="10" width="120" height="40" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="550" y="28" text-anchor="middle" fill="#713f12" font-weight="600" font-size="11">Chiral Signs</text>
    <text x="550" y="42" text-anchor="middle" fill="#64748b" font-size="9">CW/CCW match</text>

    <!-- Row 2 -->
    <path d="M 550 55 L 550 80 L 70 80 L 70 105" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#varr)"/>

    <!-- Check 4: Planarity -->
    <rect x="10" y="110" width="120" height="40" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="70" y="128" text-anchor="middle" fill="#713f12" font-weight="600" font-size="11">Planarity</text>
    <text x="70" y="142" text-anchor="middle" fill="#64748b" font-size="9">OOP E &lt; 0.7 N</text>

    <line x1="135" y1="130" x2="165" y2="130" stroke="#2563eb" stroke-width="1.5" marker-end="url(#varr)"/>

    <!-- Check 5: Double bond -->
    <rect x="170" y="110" width="120" height="40" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="230" y="128" text-anchor="middle" fill="#713f12" font-weight="600" font-size="11">Double Bond</text>
    <text x="230" y="142" text-anchor="middle" fill="#64748b" font-size="9">cos θ + 1 &gt; 10⁻³</text>

    <line x1="295" y1="130" x2="325" y2="130" stroke="#2563eb" stroke-width="1.5" marker-end="url(#varr)"/>

    <!-- Pass -->
    <rect x="330" y="110" width="120" height="40" rx="6" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
    <text x="390" y="135" text-anchor="middle" fill="#14532d" font-weight="700">✓ Valid</text>

    <!-- Reject arrows -->
    <line x1="230" y1="55" x2="230" y2="200" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="390" y1="55" x2="390" y2="200" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="550" y1="55" x2="550" y2="200" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="70" y1="155" x2="70" y2="200" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="230" y1="155" x2="230" y2="200" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>

    <!-- Retry box -->
    <rect x="10" y="205" width="600" height="35" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="310" y="227" text-anchor="middle" fill="#991b1b" font-weight="600">
      ✗ Any failure → retry with next RNG state
    </text>
  </g>
</svg>
