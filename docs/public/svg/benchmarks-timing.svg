<svg viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg" style="max-width:570px;margin:2em auto;display:block;">
  <rect x="0" y="0" width="600" height="250" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>

  <g font-family="system-ui,sans-serif" font-size="11">
    <text x="300" y="15" text-anchor="middle" fill="#1e3a5f" font-weight="700" font-size="13">RMSD Distribution (heavy-atom pairwise)</text>

    <!-- Axes -->
    <line x1="60" y1="200" x2="560" y2="200" stroke="#94a3b8" stroke-width="1"/>
    <line x1="60" y1="200" x2="60" y2="30" stroke="#94a3b8" stroke-width="1"/>
    <text x="50" y="25" text-anchor="end" fill="#334155" font-size="10">count</text>
    <text x="556" y="220" text-anchor="end" fill="#334155" font-size="10">RMSD (Å)</text>

    <!-- X ticks -->
    <text x="60" y="218" text-anchor="middle" fill="#64748b" font-size="9">0</text>
    <text x="160" y="218" text-anchor="middle" fill="#64748b" font-size="9">0.1</text>
    <text x="260" y="218" text-anchor="middle" fill="#64748b" font-size="9">0.2</text>
    <text x="360" y="218" text-anchor="middle" fill="#64748b" font-size="9">0.3</text>
    <text x="460" y="218" text-anchor="middle" fill="#64748b" font-size="9">0.5</text>
    <text x="560" y="218" text-anchor="middle" fill="#64748b" font-size="9">1.0</text>

    <!-- Histogram bars (approximating the distribution) -->
    <rect x="60" y="40" width="40" height="160" fill="#10b981" rx="2" opacity="0.8"/>
    <rect x="105" y="70" width="40" height="130" fill="#10b981" rx="2" opacity="0.7"/>
    <rect x="150" y="130" width="40" height="70" fill="#10b981" rx="2" opacity="0.6"/>
    <rect x="195" y="150" width="40" height="50" fill="#2563eb" rx="2" opacity="0.6"/>
    <rect x="240" y="170" width="40" height="30" fill="#2563eb" rx="2" opacity="0.5"/>
    <rect x="285" y="180" width="40" height="20" fill="#2563eb" rx="2" opacity="0.4"/>
    <rect x="330" y="185" width="40" height="15" fill="#ca8a04" rx="2" opacity="0.5"/>
    <rect x="375" y="188" width="40" height="12" fill="#ca8a04" rx="2" opacity="0.4"/>
    <rect x="420" y="192" width="40" height="8" fill="#ca8a04" rx="2" opacity="0.3"/>
    <rect x="465" y="195" width="40" height="5" fill="#ef4444" rx="2" opacity="0.3"/>
    <rect x="510" y="197" width="40" height="3" fill="#ef4444" rx="2" opacity="0.2"/>

    <!-- 0.5Å threshold line -->
    <line x1="460" y1="30" x2="460" y2="200" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="465" y="42" fill="#ef4444" font-size="9" font-weight="600">98.4%</text>
    <text x="465" y="53" fill="#ef4444" font-size="9">below</text>
  </g>
</svg>
