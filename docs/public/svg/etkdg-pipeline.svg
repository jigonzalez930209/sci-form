<svg viewBox="0 0 650 220" xmlns="http://www.w3.org/2000/svg" style="max-width:620px;margin:2em auto;display:block;">
  <g font-family="system-ui,sans-serif" font-size="12">
    <!-- DG result (left) -->
    <rect x="10" y="20" width="190" height="170" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="105" y="45" text-anchor="middle" fill="#991b1b" font-weight="700" font-size="13">Plain DG</text>

    <!-- Messy molecule -->
    <circle cx="60" cy="90" r="6" fill="#ef4444"/>
    <circle cx="105" cy="75" r="6" fill="#ef4444"/>
    <circle cx="140" cy="100" r="6" fill="#ef4444"/>
    <circle cx="100" cy="135" r="6" fill="#ef4444"/>
    <circle cx="150" cy="150" r="6" fill="#ef4444"/>
    <line x1="66" y1="90" x2="99" y2="75" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="111" y1="75" x2="134" y2="100" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="134" y1="100" x2="100" y2="135" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="106" y1="135" x2="144" y2="150" stroke="#ef4444" stroke-width="1.5"/>

    <text x="105" y="178" text-anchor="middle" fill="#991b1b" font-size="10">Random torsions</text>

    <!-- Arrow -->
    <text x="235" y="110" text-anchor="middle" fill="#2563eb" font-weight="700" font-size="20">→</text>
    <text x="235" y="130" text-anchor="middle" fill="#64748b" font-size="10">ETKDG FF</text>

    <!-- ETKDG result (right) -->
    <rect x="270" y="20" width="190" height="170" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
    <text x="365" y="45" text-anchor="middle" fill="#14532d" font-weight="700" font-size="13">ETKDG Refined</text>

    <!-- Clean molecule -->
    <circle cx="310" cy="90" r="6" fill="#10b981"/>
    <circle cx="345" cy="75" r="6" fill="#10b981"/>
    <circle cx="385" cy="85" r="6" fill="#10b981"/>
    <circle cx="400" cy="120" r="6" fill="#10b981"/>
    <circle cx="370" cy="150" r="6" fill="#10b981"/>
    <line x1="316" y1="90" x2="339" y2="75" stroke="#10b981" stroke-width="1.5"/>
    <line x1="351" y1="75" x2="379" y2="85" stroke="#10b981" stroke-width="1.5"/>
    <line x1="385" y1="91" x2="400" y2="114" stroke="#10b981" stroke-width="1.5"/>
    <line x1="394" y1="120" x2="376" y2="150" stroke="#10b981" stroke-width="1.5"/>

    <text x="365" y="178" text-anchor="middle" fill="#14532d" font-size="10">CSD-preferred torsions</text>

    <!-- Histogram (right side) -->
    <rect x="490" y="20" width="150" height="170" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
    <text x="565" y="40" text-anchor="middle" fill="#334155" font-weight="700" font-size="11">CSD Histogram</text>

    <!-- Mini histogram bars -->
    <rect x="505" y="155" width="8" height="20" fill="#2563eb" opacity="0.3"/>
    <rect x="515" y="145" width="8" height="30" fill="#2563eb" opacity="0.4"/>
    <rect x="525" y="80" width="8" height="95" fill="#2563eb" opacity="0.7"/>
    <rect x="535" y="60" width="8" height="115" fill="#2563eb"/>
    <rect x="545" y="100" width="8" height="75" fill="#2563eb" opacity="0.6"/>
    <rect x="555" y="140" width="8" height="35" fill="#2563eb" opacity="0.4"/>
    <rect x="565" y="155" width="8" height="20" fill="#2563eb" opacity="0.3"/>
    <rect x="575" y="140" width="8" height="35" fill="#2563eb" opacity="0.4"/>
    <rect x="585" y="100" width="8" height="75" fill="#2563eb" opacity="0.6"/>
    <rect x="595" y="60" width="8" height="115" fill="#2563eb"/>
    <rect x="605" y="80" width="8" height="95" fill="#2563eb" opacity="0.7"/>
    <rect x="615" y="145" width="8" height="30" fill="#2563eb" opacity="0.4"/>

    <text x="565" y="185" text-anchor="middle" fill="#64748b" font-size="9">-180° → 0° → 180°</text>
  </g>
</svg>
