<svg viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg" style="max-width:480px;margin:2em auto;display:block;">
  <rect x="0" y="0" width="500" height="250" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>

  <g font-family="system-ui,sans-serif" font-size="11">
    <text x="250" y="15" text-anchor="middle" fill="#1e3a5f" font-weight="700" font-size="13">Time vs Molecule Size</text>

    <!-- Axes -->
    <line x1="60" y1="210" x2="470" y2="210" stroke="#94a3b8" stroke-width="1"/>
    <line x1="60" y1="210" x2="60" y2="30" stroke="#94a3b8" stroke-width="1"/>
    <text x="50" y="25" text-anchor="end" fill="#334155" font-size="10">ms</text>
    <text x="468" y="228" text-anchor="end" fill="#334155" font-size="10">atoms</text>

    <!-- X labels -->
    <text x="100" y="225" text-anchor="middle" fill="#64748b" font-size="9">10</text>
    <text x="200" y="225" text-anchor="middle" fill="#64748b" font-size="9">30</text>
    <text x="300" y="225" text-anchor="middle" fill="#64748b" font-size="9">50</text>
    <text x="400" y="225" text-anchor="middle" fill="#64748b" font-size="9">100</text>

    <!-- Y labels -->
    <text x="55" y="210" text-anchor="end" fill="#64748b" font-size="9">0</text>
    <text x="55" y="150" text-anchor="end" fill="#64748b" font-size="9">100</text>
    <text x="55" y="90" text-anchor="end" fill="#64748b" font-size="9">500</text>
    <text x="55" y="40" text-anchor="end" fill="#64748b" font-size="9">2000</text>

    <!-- Data points (approximate) -->
    <circle cx="100" cy="200" r="3" fill="#2563eb"/>
    <circle cx="150" cy="195" r="3" fill="#2563eb"/>
    <circle cx="200" cy="185" r="3" fill="#2563eb"/>
    <circle cx="250" cy="170" r="3" fill="#2563eb"/>
    <circle cx="300" cy="145" r="3" fill="#2563eb"/>
    <circle cx="350" cy="110" r="3" fill="#2563eb"/>
    <circle cx="400" cy="60" r="3" fill="#2563eb"/>

    <!-- Trend line -->
    <path d="M 100 200 C 200 190 300 155 400 60" fill="none" stroke="#2563eb" stroke-width="2"/>

    <!-- Annotation -->
    <text x="350" y="50" fill="#2563eb" font-size="10" font-weight="600">~O(N³)</text>
  </g>
</svg>
