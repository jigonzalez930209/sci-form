<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;margin:2em auto;display:block;">
  <defs>
    <marker id="espArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <linearGradient id="espColorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f9fafb"/>
      <stop offset="70%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="720" height="400" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>


  <g font-family="system-ui,sans-serif">
    <!-- Title -->
    <text x="360" y="30" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="700">Electrostatic Potential (ESP) Map</text>

    <!-- 3D grid illustration -->
    <g transform="translate(130, 190)">
      <!-- Grid planes (isometric-ish) -->
      <rect x="-90" y="-80" width="180" height="160" rx="4" fill="none" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>

      <!-- Grid dots -->
      <g fill="#94a3b8" opacity="0.6">
        <circle cx="-60" cy="-60" r="2"/><circle cx="-20" cy="-60" r="2"/><circle cx="20" cy="-60" r="2"/><circle cx="60" cy="-60" r="2"/>
        <circle cx="-60" cy="-20" r="2"/><circle cx="-20" cy="-20" r="2"/><circle cx="20" cy="-20" r="2"/><circle cx="60" cy="-20" r="2"/>
        <circle cx="-60" cy="20" r="2"/><circle cx="-20" cy="20" r="2"/><circle cx="20" cy="20" r="2"/><circle cx="60" cy="20" r="2"/>
        <circle cx="-60" cy="60" r="2"/><circle cx="-20" cy="60" r="2"/><circle cx="20" cy="60" r="2"/><circle cx="60" cy="60" r="2"/>
      </g>

      <!-- Colored ESP regions -->
      <circle cx="-30" cy="10" r="22" fill="#dc2626" opacity="0.2" stroke="#dc2626" stroke-width="0.5"/>
      <text x="-30" y="15" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="600">−</text>

      <circle cx="30" cy="-10" r="18" fill="#2563eb" opacity="0.2" stroke="#2563eb" stroke-width="0.5"/>
      <text x="30" y="-5" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">+</text>

      <!-- Molecule overlay -->
      <circle cx="-10" cy="0" r="10" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
      <text x="-10" y="4" text-anchor="middle" fill="white" font-size="9" font-weight="700">O</text>
      <line x1="-10" y1="0" x2="-35" y2="-25" stroke="#6b7280" stroke-width="2"/>
      <line x1="-10" y1="0" x2="15" y2="-25" stroke="#6b7280" stroke-width="2"/>
      <circle cx="-35" cy="-25" r="7" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
      <text x="-35" y="-22" text-anchor="middle" fill="#374151" font-size="8" font-weight="700">H</text>
      <circle cx="15" cy="-25" r="7" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
      <text x="15" y="-22" text-anchor="middle" fill="#374151" font-size="8" font-weight="700">H</text>

      <!-- Labels -->
      <text x="0" y="100" text-anchor="middle" fill="#64748b" font-size="11">3D voxel grid</text>
    </g>

    <!-- Formula section -->
    <rect x="280" y="55" width="420" height="130" rx="10" fill="#ecfdf5" stroke="#86efac" stroke-width="1"/>

    <text x="300" y="82" fill="#065f46" font-weight="700" font-size="14">ESP Formula</text>

    <text x="300" y="108" fill="#1e293b" font-size="12" font-weight="600">Coulomb potential at grid point r⃗:</text>
    <text x="300" y="132" fill="#064e3b" font-size="13" font-weight="600">Φ(r⃗) = Σₐ qₐ / |r⃗ − R⃗ₐ|</text>

    <text x="300" y="158" fill="#64748b" font-size="11">qₐ = partial charge on atom A</text>
    <text x="300" y="175" fill="#64748b" font-size="11">R⃗ₐ = position of atom A</text>

    <!-- Color scale -->
    <rect x="280" y="200" width="420" height="70" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="300" y="225" fill="#065f46" font-weight="700" font-size="13">Color Scale</text>
    <rect x="300" y="238" width="360" height="18" rx="4" fill="url(#espColorGrad)"/>
    <text x="300" y="268" fill="#dc2626" font-size="10" font-weight="600">negative (nucleophilic)</text>
    <text x="660" y="268" text-anchor="end" fill="#2563eb" font-size="10" font-weight="600">positive (electrophilic)</text>

    <!-- Cube format box -->
    <rect x="20" y="305" width="680" height="70" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <text x="40" y="330" fill="#065f46" font-weight="700" font-size="13">Gaussian .cube Export</text>
    <text x="40" y="350" fill="#64748b" font-size="11">Header: N_atoms, origin (x,y,z) | N_x dx_x dx_y dx_z | N_y ... | N_z ... | atom lines | volumetric data</text>
    <text x="40" y="366" fill="#64748b" font-size="11">Grid: N_x × N_y × N_z float values, one ESP value Φ(r⃗) per voxel</text>
  </g>
</svg>
