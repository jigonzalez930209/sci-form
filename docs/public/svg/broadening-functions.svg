<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" font-family="system-ui, sans-serif">
  <rect width="720" height="360" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1"/>
  <text x="360" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Broadening Line Shapes: Gaussian vs Lorentzian</text>

  <!-- ─── Left panel: Gaussian ─── -->
  <rect x="20" y="45" width="320" height="270" rx="8" fill="white" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="180" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Gaussian</text>
  <text x="180" y="83" text-anchor="middle" font-size="10" fill="#64748b">G(x, σ) = (1/σ√2π) exp(−x²/2σ²)</text>

  <!-- Gaussian axes -->
  <line x1="50" y1="240" x2="308" y2="240" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="50" y1="100" x2="50" y2="240" stroke="#1e293b" stroke-width="1.5"/>
  <text x="180" y="260" text-anchor="middle" font-size="10" fill="#64748b">Δ (eV or cm⁻¹)</text>
  <text x="35" y="175" text-anchor="middle" fill="#64748b" font-size="10" transform="rotate(-90,35,175)">Intensity</text>

  <!-- Gaussian curve (standard bell) -->
  <path d="M 55,239 Q 70,238 90,235 Q 105,228 115,215 Q 125,198 135,175 Q 145,152 155,130 Q 162,115 170,108 Q 180,100 190,108 Q 198,115 205,130 Q 215,152 225,175 Q 235,198 245,215 Q 255,228 265,235 Q 280,238 300,239" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <path d="M 55,239 Q 70,238 90,235 Q 105,228 115,215 Q 125,198 135,175 Q 145,152 155,130 Q 162,115 170,108 Q 180,100 190,108 Q 198,115 205,130 Q 215,152 225,175 Q 235,198 245,215 Q 255,228 265,235 Q 280,238 300,239 L 300,239 L 55,239 Z" fill="#3b82f6" opacity="0.12"/>

  <!-- FWHM annotation -->
  <line x1="50" y1="170" x2="308" y2="170" stroke="#64748b" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="312" y="174" font-size="9" fill="#64748b">½</text>
  <line x1="142" y1="170" x2="218" y2="170" stroke="#ef4444" stroke-width="2"/>
  <text x="180" y="167" text-anchor="middle" font-size="9" fill="#ef4444">FWHM = 2.355σ</text>

  <!-- σ annotation -->
  <line x1="180" y1="100" x2="215" y2="100" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="215" y1="100" x2="215" y2="240" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="218" y="175" font-size="9" fill="#94a3b8">σ</text>

  <!-- Properties box -->
  <rect x="35" y="248" width="290" height="55" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="45" y="264" font-size="10" fill="#1e40af" font-weight="600">Properties:</text>
  <text x="45" y="278" font-size="9" fill="#374151">• Fast decay in wings (exponential)</text>
  <text x="45" y="291" font-size="9" fill="#374151">• Instrument + thermal broadening</text>
  <text x="45" y="304" font-size="9" fill="#374151">• Default for UV-Vis sTDA in sci-form</text>

  <!-- ─── Right panel: Lorentzian ─── -->
  <rect x="360" y="45" width="340" height="270" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="530" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">Lorentzian</text>
  <text x="530" y="83" text-anchor="middle" font-size="10" fill="#64748b">L(x, γ) = (γ/π) / (x² + γ²)</text>

  <!-- Lorentzian axes -->
  <line x1="390" y1="240" x2="680" y2="240" stroke="#1e293b" stroke-width="1.5"/>
  <line x1="390" y1="100" x2="390" y2="240" stroke="#1e293b" stroke-width="1.5"/>
  <text x="535" y="260" text-anchor="middle" font-size="10" fill="#64748b">Δ (eV, ppm, or cm⁻¹)</text>

  <!-- Lorentzian curve (sharper peak, fatter wings) -->
  <path d="M 393,239 Q 410,238 425,235 Q 440,230 450,222 Q 458,214 462,205 Q 466,194 468,182 Q 470,164 475,148 Q 482,128 493,114 Q 505,104 518,108 Q 530,100 542,108 Q 555,114 566,128 Q 577,148 582,164 Q 584,182 586,194 Q 588,205 592,214 Q 596,222 606,230 Q 620,235 640,238 Q 660,239 675,239" fill="none" stroke="#8b5cf6" stroke-width="2.5"/>
  <path d="M 393,239 Q 410,238 425,235 Q 440,230 450,222 Q 458,214 462,205 Q 466,194 468,182 Q 470,164 475,148 Q 482,128 493,114 Q 505,104 518,108 Q 530,100 542,108 Q 555,114 566,128 Q 577,148 582,164 Q 584,182 586,194 Q 588,205 592,214 Q 596,222 606,230 Q 620,235 640,238 Q 660,239 675,239 L 393,239 Z" fill="#8b5cf6" opacity="0.12"/>

  <!-- FWHM annotation -->
  <line x1="390" y1="170" x2="680" y2="170" stroke="#64748b" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="682" y="174" font-size="9" fill="#64748b">½</text>
  <line x1="504" y1="170" x2="556" y2="170" stroke="#ef4444" stroke-width="2"/>
  <text x="530" y="167" text-anchor="middle" font-size="9" fill="#ef4444">FWHM = 2γ</text>

  <!-- Heavy tails label -->
  <text x="420" y="218" font-size="9" fill="#8b5cf6" font-style="italic">heavy tails</text>
  <text x="630" y="218" font-size="9" fill="#8b5cf6" font-style="italic">heavy tails</text>

  <!-- Properties box -->
  <rect x="375" y="248" width="310" height="55" rx="6" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="385" y="264" font-size="10" fill="#6d28d9" font-weight="600">Properties:</text>
  <text x="385" y="278" font-size="9" fill="#374151">• Slower decay in wings (1/x² tails)</text>
  <text x="385" y="291" font-size="9" fill="#374151">• Natural line shape (lifetime broadening)</text>
  <text x="385" y="304" font-size="9" fill="#374151">• Used for IR spectra and NMR in sci-form</text>

  <!-- Bottom comparison note -->
  <rect x="20" y="322" width="680" height="28" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="360" y="337" text-anchor="middle" font-size="10" fill="#166534" font-weight="600">Both share the same peak area. Lorentzian has sharper peak but extends further. Gaussian falls off faster at large |Δ|.</text>
  <text x="360" y="349" text-anchor="middle" font-size="9" fill="#166534">sci-form: UV-Vis accepts BroadeningType::Gaussian or BroadeningType::Lorentzian. IR and NMR always use Lorentzian.</text>
</svg>
