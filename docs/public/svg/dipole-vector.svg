<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" style="max-width:680px;margin:2em auto;display:block;">
  <defs>
    <marker id="dipArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="dipVec" markerWidth="12" markerHeight="8" refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#dc2626"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="380" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>


  <g font-family="system-ui,sans-serif">
    <!-- Title -->
    <text x="360" y="30" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="700">Molecular Dipole Moment</text>

    <!-- Molecule diagram (water-like) -->
    <g transform="translate(120, 160)">
      <!-- Bonds -->
      <line x1="0" y1="0" x2="-50" y2="-50" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="50" y2="-50" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>

      <!-- Atoms -->
      <circle cx="0" cy="0" r="18" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" fill="white" font-weight="700" font-size="14">O</text>
      <text x="0" y="25" text-anchor="middle" fill="#dc2626" font-size="10">q = −0.33</text>

      <circle cx="-50" cy="-50" r="12" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
      <text x="-50" y="-46" text-anchor="middle" fill="#374151" font-weight="700" font-size="11">H</text>
      <text x="-50" y="-65" text-anchor="middle" fill="#6366f1" font-size="10">q = +0.17</text>

      <circle cx="50" cy="-50" r="12" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
      <text x="50" y="-46" text-anchor="middle" fill="#374151" font-weight="700" font-size="11">H</text>
      <text x="50" y="-65" text-anchor="middle" fill="#6366f1" font-size="10">q = +0.17</text>

      <!-- Dipole vector -->
      <line x1="0" y1="5" x2="0" y2="70" stroke="#dc2626" stroke-width="3" marker-end="url(#dipVec)"/>
      <text x="16" y="50" fill="#dc2626" font-weight="700" font-size="13">μ⃗</text>
    </g>

    <!-- Formula box -->
    <rect x="280" y="60" width="420" height="165" rx="10" fill="#fff1f2" stroke="#fecaca" stroke-width="1"/>

    <text x="300" y="88" fill="#991b1b" font-weight="700" font-size="14">Dipole Calculation</text>

    <!-- Nuclear contribution -->
    <text x="300" y="115" fill="#1e293b" font-size="12" font-weight="600">Nuclear term:</text>
    <text x="300" y="135" fill="#64748b" font-size="12">μ⃗_nuc = Σₐ Zₐ · R⃗ₐ</text>

    <!-- Electronic contribution -->
    <text x="300" y="162" fill="#1e293b" font-size="12" font-weight="600">With partial charges:</text>
    <text x="300" y="182" fill="#64748b" font-size="12">μ⃗ = Σₐ qₐ · R⃗ₐ</text>

    <!-- Unit conversion -->
    <text x="300" y="209" fill="#1e293b" font-size="12" font-weight="600">Conversion to Debye:</text>
    <text x="300" y="225" fill="#64748b" font-size="12">|μ⃗| in Debye = |μ⃗|_au × 4.80321</text>

    <!-- Properties box -->
    <rect x="20" y="270" width="680" height="90" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="40" y="296" fill="#991b1b" font-weight="700" font-size="14">Physical Interpretation</text>

    <text x="40" y="318" fill="#64748b" font-size="12">• Magnitude |μ⃗| measures polarity — H₂O ≈ 1.85 D, CO₂ ≈ 0 D (symmetric), HF ≈ 1.83 D</text>
    <text x="40" y="340" fill="#64748b" font-size="12">• Direction points from negative to positive charge center (physics convention)</text>
  </g>
</svg>
