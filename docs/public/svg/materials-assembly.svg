<svg width="720" height="440" viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" style="margin:2em auto;display:block;">
  <defs>
    <marker id="asmArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="440" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>


  <g font-family="system-ui,sans-serif">
    <!-- Title -->
    <text x="360" y="30" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="700">Framework Assembly Pipeline</text>

    <!-- Step 1: Topology -->
    <rect x="20" y="55" width="200" height="110" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="44" cy="75" r="12" fill="#7c3aed"/>
    <text x="44" y="79" text-anchor="middle" fill="white" font-weight="700" font-size="10">1</text>
    <text x="64" y="79" fill="#5b21b6" font-weight="600" font-size="12">Topology</text>
    <text x="40" y="100" fill="#64748b" font-size="11">Nodes: fractional positions</text>
    <text x="40" y="115" fill="#64748b" font-size="11">Edges: node pairs + offsets</text>

    <!-- Topology mini-diagrams -->
    <g transform="translate(60, 138)">
      <circle cx="0" cy="0" r="4" fill="#7c3aed"/>
      <circle cx="40" cy="0" r="4" fill="#7c3aed"/>
      <circle cx="0" cy="20" r="4" fill="#7c3aed"/>
      <circle cx="40" cy="20" r="4" fill="#7c3aed"/>
      <line x1="4" y1="0" x2="36" y2="0" stroke="#c4b5fd" stroke-width="1.5"/>
      <line x1="0" y1="4" x2="0" y2="16" stroke="#c4b5fd" stroke-width="1.5"/>
      <line x1="40" y1="4" x2="40" y2="16" stroke="#c4b5fd" stroke-width="1.5"/>
      <line x1="4" y1="20" x2="36" y2="20" stroke="#c4b5fd" stroke-width="1.5"/>
      <text x="55" y="14" fill="#94a3b8" font-size="9">pcu</text>
    </g>

    <!-- Arrow 1→2 -->
    <line x1="230" y1="110" x2="262" y2="110" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#asmArrow)"/>

    <!-- Step 2: SBU Placement -->
    <rect x="270" y="55" width="200" height="110" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="294" cy="75" r="12" fill="#7c3aed"/>
    <text x="294" y="79" text-anchor="middle" fill="white" font-weight="700" font-size="10">2</text>
    <text x="314" y="79" fill="#5b21b6" font-weight="600" font-size="12">SBU Placement</text>
    <text x="290" y="100" fill="#64748b" font-size="11">Metal node at each</text>
    <text x="290" y="115" fill="#64748b" font-size="11">topology vertex</text>
    <text x="290" y="135" fill="#64748b" font-size="11">Geometry: tetrahedral,</text>
    <text x="290" y="150" fill="#64748b" font-size="11">octahedral, etc.</text>

    <!-- Arrow 2→3 -->
    <line x1="480" y1="110" x2="512" y2="110" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#asmArrow)"/>

    <!-- Step 3: Linker Orientation -->
    <rect x="520" y="55" width="180" height="110" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="544" cy="75" r="12" fill="#7c3aed"/>
    <text x="544" y="79" text-anchor="middle" fill="white" font-weight="700" font-size="10">3</text>
    <text x="564" y="79" fill="#5b21b6" font-weight="600" font-size="12">Linker Orientation</text>
    <text x="540" y="100" fill="#64748b" font-size="11">Rodrigues rotation</text>
    <text x="540" y="115" fill="#64748b" font-size="11">from x̂ to edge dir</text>
    <text x="540" y="135" fill="#64748b" font-size="11">Place at midpoint</text>
    <text x="540" y="150" fill="#64748b" font-size="11">of each edge</text>

    <!-- Rodrigues formula -->
    <rect x="20" y="195" width="680" height="80" rx="10" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="40" y="220" fill="#5b21b6" font-weight="700" font-size="13">Rodrigues Rotation Formula</text>
    <text x="40" y="245" fill="#4c1d95" font-size="12" font-weight="600">R(v⃗) = v⃗ cosθ + (k⃗ × v⃗) sinθ + k⃗ (k⃗ · v⃗)(1 − cosθ)</text>
    <text x="40" y="265" fill="#64748b" font-size="11">k⃗ = rotation axis (normalized cross product),  θ = angle between x̂ and edge direction</text>

    <!-- Coordination geometries -->
    <rect x="20" y="295" width="680" height="120" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
    <text x="40" y="320" fill="#5b21b6" font-weight="700" font-size="13">Coordination Geometries</text>

    <!-- Linear -->
    <g transform="translate(60, 350)">
      <circle cx="0" cy="0" r="8" fill="#7c3aed"/>
      <line x1="-25" y1="0" x2="-8" y2="0" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="8" y1="0" x2="25" y2="0" stroke="#c4b5fd" stroke-width="2"/>
      <circle cx="-25" cy="0" r="4" fill="#a78bfa"/>
      <circle cx="25" cy="0" r="4" fill="#a78bfa"/>
      <text x="0" y="25" text-anchor="middle" fill="#64748b" font-size="10">Linear (2)</text>
    </g>

    <!-- Trigonal -->
    <g transform="translate(180, 350)">
      <circle cx="0" cy="0" r="8" fill="#7c3aed"/>
      <line x1="0" y1="-8" x2="0" y2="-25" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="7" y1="5" x2="22" y2="13" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="-7" y1="5" x2="-22" y2="13" stroke="#c4b5fd" stroke-width="2"/>
      <circle cx="0" cy="-25" r="4" fill="#a78bfa"/>
      <circle cx="22" cy="13" r="4" fill="#a78bfa"/>
      <circle cx="-22" cy="13" r="4" fill="#a78bfa"/>
      <text x="0" y="30" text-anchor="middle" fill="#64748b" font-size="10">Trigonal (3)</text>
    </g>

    <!-- Tetrahedral -->
    <g transform="translate(320, 350)">
      <circle cx="0" cy="0" r="8" fill="#7c3aed"/>
      <line x1="-5" y1="-6" x2="-18" y2="-20" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="5" y1="-6" x2="18" y2="-20" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="-5" y1="6" x2="-18" y2="20" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="5" y1="6" x2="18" y2="20" stroke="#c4b5fd" stroke-width="2"/>
      <circle cx="-18" cy="-20" r="4" fill="#a78bfa"/>
      <circle cx="18" cy="-20" r="4" fill="#a78bfa"/>
      <circle cx="-18" cy="20" r="4" fill="#a78bfa"/>
      <circle cx="18" cy="20" r="4" fill="#a78bfa"/>
      <text x="0" y="38" text-anchor="middle" fill="#64748b" font-size="10">Tetrahedral (4)</text>
    </g>

    <!-- Square Planar -->
    <g transform="translate(460, 350)">
      <circle cx="0" cy="0" r="8" fill="#7c3aed"/>
      <line x1="0" y1="-8" x2="0" y2="-22" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="8" y1="0" x2="22" y2="0" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="0" y1="8" x2="0" y2="22" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="-8" y1="0" x2="-22" y2="0" stroke="#c4b5fd" stroke-width="2"/>
      <circle cx="0" cy="-22" r="4" fill="#a78bfa"/>
      <circle cx="22" cy="0" r="4" fill="#a78bfa"/>
      <circle cx="0" cy="22" r="4" fill="#a78bfa"/>
      <circle cx="-22" cy="0" r="4" fill="#a78bfa"/>
      <text x="0" y="38" text-anchor="middle" fill="#64748b" font-size="10">Square Planar (4)</text>
    </g>

    <!-- Octahedral -->
    <g transform="translate(600, 350)">
      <circle cx="0" cy="0" r="8" fill="#7c3aed"/>
      <line x1="0" y1="-8" x2="0" y2="-22" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="8" y1="0" x2="22" y2="0" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="0" y1="8" x2="0" y2="22" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="-8" y1="0" x2="-22" y2="0" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="6" y1="-6" x2="16" y2="-16" stroke="#c4b5fd" stroke-width="2"/>
      <line x1="-6" y1="6" x2="-16" y2="16" stroke="#c4b5fd" stroke-width="2"/>
      <circle cx="0" cy="-22" r="4" fill="#a78bfa"/>
      <circle cx="22" cy="0" r="4" fill="#a78bfa"/>
      <circle cx="0" cy="22" r="4" fill="#a78bfa"/>
      <circle cx="-22" cy="0" r="4" fill="#a78bfa"/>
      <circle cx="16" cy="-16" r="4" fill="#a78bfa"/>
      <circle cx="-16" cy="16" r="4" fill="#a78bfa"/>
      <text x="0" y="38" text-anchor="middle" fill="#64748b" font-size="10">Octahedral (6)</text>
    </g>
  </g>
</svg>
