<svg width="720" height="380" viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" style="margin:2em auto;display:block;">
  <defs>
    <marker id="chunkArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0891b2"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="380" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>


  <g font-family="system-ui,sans-serif">
    <!-- Title -->
    <text x="360" y="30" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="700">Chunked Streaming &amp; Web Workers</text>

    <!-- Large dataset -->
    <rect x="20" y="55" width="130" height="120" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
    <text x="85" y="78" text-anchor="middle" fill="#0e7490" font-weight="600" font-size="12">Large Dataset</text>
    <g transform="translate(35, 88)">
      <rect x="0" y="0" width="100" height="10" rx="2" fill="#0891b2" opacity="0.3"/>
      <rect x="0" y="14" width="100" height="10" rx="2" fill="#0891b2" opacity="0.3"/>
      <rect x="0" y="28" width="100" height="10" rx="2" fill="#0891b2" opacity="0.3"/>
      <rect x="0" y="42" width="100" height="10" rx="2" fill="#0891b2" opacity="0.3"/>
      <rect x="0" y="56" width="100" height="10" rx="2" fill="#0891b2" opacity="0.3"/>
    </g>
    <text x="85" y="163" text-anchor="middle" fill="#64748b" font-size="10">N items</text>

    <!-- Arrow to chunks -->
    <line x1="160" y1="115" x2="192" y2="115" stroke="#0891b2" stroke-width="1.5" marker-end="url(#chunkArrow)"/>
    <text x="176" y="105" text-anchor="middle" fill="#0891b2" font-size="9" font-weight="600">split</text>

    <!-- Chunks -->
    <g transform="translate(205, 60)">
      <rect x="0" y="0" width="90" height="30" rx="5" fill="#cffafe" stroke="#22d3ee" stroke-width="1"/>
      <text x="45" y="19" text-anchor="middle" fill="#0e7490" font-size="10" font-weight="600">Chunk 0</text>

      <rect x="0" y="38" width="90" height="30" rx="5" fill="#cffafe" stroke="#22d3ee" stroke-width="1"/>
      <text x="45" y="57" text-anchor="middle" fill="#0e7490" font-size="10" font-weight="600">Chunk 1</text>

      <rect x="0" y="76" width="90" height="30" rx="5" fill="#cffafe" stroke="#22d3ee" stroke-width="1"/>
      <text x="45" y="95" text-anchor="middle" fill="#0e7490" font-size="10" font-weight="600">Chunk 2</text>

      <text x="45" y="118" text-anchor="middle" fill="#94a3b8" font-size="10">⋮</text>
    </g>

    <!-- Arrows to workers -->
    <line x1="305" y1="75" x2="357" y2="75" stroke="#0891b2" stroke-width="1.5" marker-end="url(#chunkArrow)"/>
    <line x1="305" y1="98" x2="357" y2="115" stroke="#0891b2" stroke-width="1.5" marker-end="url(#chunkArrow)"/>
    <line x1="305" y1="136" x2="357" y2="155" stroke="#0891b2" stroke-width="1.5" marker-end="url(#chunkArrow)"/>

    <!-- Workers -->
    <g transform="translate(365, 55)">
      <rect x="0" y="0" width="120" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="60" y="16" text-anchor="middle" fill="#6d28d9" font-size="10" font-weight="600">Worker 0</text>
      <text x="60" y="32" text-anchor="middle" fill="#a78bfa" font-size="9">WASM instance</text>

      <rect x="0" y="48" width="120" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="60" y="64" text-anchor="middle" fill="#6d28d9" font-size="10" font-weight="600">Worker 1</text>
      <text x="60" y="80" text-anchor="middle" fill="#a78bfa" font-size="9">WASM instance</text>

      <rect x="0" y="96" width="120" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="60" y="112" text-anchor="middle" fill="#6d28d9" font-size="10" font-weight="600">Worker 2</text>
      <text x="60" y="128" text-anchor="middle" fill="#a78bfa" font-size="9">WASM instance</text>
    </g>

    <!-- Arrow to merge -->
    <line x1="495" y1="75" x2="537" y2="105" stroke="#0891b2" stroke-width="1.5" marker-end="url(#chunkArrow)"/>
    <line x1="495" y1="120" x2="537" y2="115" stroke="#0891b2" stroke-width="1.5" marker-end="url(#chunkArrow)"/>
    <line x1="495" y1="155" x2="537" y2="125" stroke="#0891b2" stroke-width="1.5" marker-end="url(#chunkArrow)"/>

    <!-- Merge result -->
    <rect x="545" y="80" width="150" height="70" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="620" y="105" text-anchor="middle" fill="#166534" font-weight="700" font-size="12">Merged Result</text>
    <text x="620" y="125" text-anchor="middle" fill="#16a34a" font-size="11">merge_results()</text>
    <text x="620" y="140" text-anchor="middle" fill="#64748b" font-size="10">ordered by task_id</text>

    <!-- Worker estimation formula -->
    <rect x="20" y="200" width="680" height="65" rx="10" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1"/>
    <text x="40" y="225" fill="#0e7490" font-weight="700" font-size="13">Worker Estimation</text>
    <text x="40" y="248" fill="#155e75" font-size="12" font-weight="600">n_workers = min(max_workers, ceil(n_items / 64))</text>
    <text x="520" y="248" fill="#64748b" font-size="11">at least 1, capped at max_workers</text>

    <!-- Chunked iterator -->
    <rect x="20" y="280" width="680" height="80" rx="10" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1"/>
    <text x="40" y="305" fill="#0e7490" font-weight="700" font-size="13">ChunkedIterator</text>
    <text x="40" y="328" fill="#64748b" font-size="12">Implements Iterator&lt;Item = DataChunk&gt; — lazily yields fixed-size data slices</text>
    <text x="40" y="348" fill="#64748b" font-size="12">DataChunk: {index, total, kind: Coordinates|EspValues|DosValues|Generic, values, count}</text>
  </g>
</svg>
