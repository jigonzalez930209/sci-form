<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220" width="780" height="220" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="780" height="220" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="13" font-weight="bold" fill="#0f172a">E1: Conformal Geometric Algebra (CGA) Pipeline</text>
  <text x="390" y="48" text-anchor="middle" font-size="10" fill="#64748b">G(4,1) algebra — unified rotation-translation via Motors</text>

  <!-- Phase boxes -->
  <rect x="10"  y="65" width="140" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80"  y="92"  text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Embed Point</text>
  <text x="80"  y="108" text-anchor="middle" font-size="10" fill="#1d4ed8">ℝ³ → G(4,1)</text>
  <text x="80"  y="122" text-anchor="middle" font-size="10" fill="#1d4ed8">x·e₁ + y·e₂ + z·e₃</text>

  <rect x="170" y="65" width="140" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="240" y="92"  text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Build Motor</text>
  <text x="240" y="108" text-anchor="middle" font-size="10" fill="#15803d">Dihedral angle</text>
  <text x="240" y="122" text-anchor="middle" font-size="10" fill="#15803d">R = e^(θ/2 · B)</text>

  <rect x="330" y="65" width="140" height="80" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="400" y="92"  text-anchor="middle" font-size="11" font-weight="bold" fill="#713f12">Apply Motor</text>
  <text x="400" y="108" text-anchor="middle" font-size="10" fill="#92400e">Subtree rotation</text>
  <text x="400" y="122" text-anchor="middle" font-size="10" fill="#92400e">X' = M X M̃</text>

  <rect x="490" y="65" width="140" height="80" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="560" y="92"  text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d">Extract 3D</text>
  <text x="560" y="108" text-anchor="middle" font-size="10" fill="#be185d">G(4,1) → ℝ³</text>
  <text x="560" y="122" text-anchor="middle" font-size="10" fill="#be185d">Conformal split</text>

  <rect x="650" y="65" width="120" height="80" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="710" y="92"  text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">MOF Assembly</text>
  <text x="710" y="108" text-anchor="middle" font-size="10" fill="#6d28d9">SBU placement</text>
  <text x="710" y="122" text-anchor="middle" font-size="10" fill="#6d28d9">Framework build</text>

  <!-- Arrows -->
  <line x1="150" y1="105" x2="168" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="105" x2="328" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="105" x2="488" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="630" y1="105" x2="648" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Labels -->
  <text x="80"  y="168" text-anchor="middle" font-size="9" fill="#64748b">3D coordinates</text>
  <text x="240" y="168" text-anchor="middle" font-size="9" fill="#64748b">axis + angle → versor</text>
  <text x="400" y="168" text-anchor="middle" font-size="9" fill="#64748b">sandwich product</text>
  <text x="560" y="168" text-anchor="middle" font-size="9" fill="#64748b">dehomogenize</text>
  <text x="710" y="168" text-anchor="middle" font-size="9" fill="#64748b">CGA frames on topology</text>

  <!-- Advantage badge -->
  <rect x="200" y="185" width="380" height="24" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="390" y="201" text-anchor="middle" font-size="10" fill="#166534">✓ No gimbal lock · No matrix decomposition · Unified rot+trans</text>
</svg>
