<svg viewBox="0 0 600 240" xmlns="http://www.w3.org/2000/svg" style="max-width:570px;margin:2em auto;display:block;">
  <rect x="0" y="0" width="600" height="240" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>

  <g font-family="system-ui,sans-serif">
    <!-- Cis configuration (left) -->
    <text x="140" y="20" text-anchor="middle" fill="#1e3a5f" font-weight="700" font-size="13">Cis (φ = 0°)</text>

    <circle cx="40" cy="80" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="40" y="84" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="10">A</text>

    <circle cx="110" cy="120" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="110" y="124" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="10">B</text>

    <circle cx="180" cy="120" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="180" y="124" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="10">C</text>

    <circle cx="250" cy="80" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="250" y="84" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="10">D</text>

    <line x1="52" y1="86" x2="98" y2="114" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="122" y1="120" x2="168" y2="120" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="192" y1="114" x2="238" y2="86" stroke="#2563eb" stroke-width="1.5"/>

    <!-- A↔D distance -->
    <line x1="40" y1="66" x2="250" y2="66" stroke="#10b981" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="145" y="60" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600">d_cis (shorter)</text>

    <!-- Trans configuration (right) -->
    <text x="460" y="20" text-anchor="middle" fill="#1e3a5f" font-weight="700" font-size="13">Trans (φ = 180°)</text>

    <circle cx="340" cy="80" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="340" y="84" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="10">A</text>

    <circle cx="410" cy="120" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="410" y="124" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="10">B</text>

    <circle cx="480" cy="120" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="480" y="124" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="10">C</text>

    <circle cx="550" cy="170" r="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="550" y="174" text-anchor="middle" fill="#2563eb" font-weight="bold" font-size="10">D</text>

    <line x1="352" y1="86" x2="398" y2="114" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="422" y1="120" x2="468" y2="120" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="492" y1="126" x2="538" y2="164" stroke="#2563eb" stroke-width="1.5"/>

    <!-- A↔D distance -->
    <line x1="340" y1="66" x2="550" y2="158" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="470" y="95" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">d_trans (longer)</text>
  </g>
</svg>
