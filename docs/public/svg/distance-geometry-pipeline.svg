<svg viewBox="0 0 620 280" xmlns="http://www.w3.org/2000/svg" style="max-width:600px;margin:2em auto;display:block;">
  <defs>
    <marker id="darr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
  </defs>
  <g font-family="system-ui,sans-serif">
    <!-- Left: Bounds Matrix -->
    <text x="100" y="20" text-anchor="middle" fill="#1e3a5f" font-weight="700" font-size="14">Bounds Matrix</text>

    <!-- Matrix visualization -->
    <rect x="25" y="30" width="150" height="150" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <!-- Upper triangle -->
    <path d="M 25 30 L 175 30 L 175 180 Z" fill="#dbeafe" opacity="0.5"/>
    <text x="130" y="85" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="600">upper</text>
    <text x="130" y="100" text-anchor="middle" fill="#2563eb" font-size="12">u_ij</text>
    <!-- Lower triangle -->
    <text x="70" y="145" text-anchor="middle" fill="#10b981" font-size="12" font-weight="600">lower</text>
    <text x="70" y="160" text-anchor="middle" fill="#10b981" font-size="12">l_ij</text>
    <!-- Diagonal -->
    <line x1="25" y1="30" x2="175" y2="180" stroke="#64748b" stroke-width="1" stroke-dasharray="3 2"/>

    <text x="100" y="205" text-anchor="middle" fill="#64748b" font-size="11">N × N matrix of distance bounds</text>

    <!-- Arrow -->
    <line x1="190" y1="105" x2="230" y2="105" stroke="#2563eb" stroke-width="1.5" marker-end="url(#darr)"/>
    <text x="210" y="95" text-anchor="middle" fill="#64748b" font-size="10">embed</text>

    <!-- Middle: Distance picking + embedding -->
    <rect x="240" y="40" width="140" height="50" rx="6" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
    <text x="310" y="60" text-anchor="middle" fill="#14532d" font-weight="600" font-size="12">Pick Distances</text>
    <text x="310" y="77" text-anchor="middle" fill="#64748b" font-size="10">d = l + r(u − l)</text>

    <line x1="310" y1="95" x2="310" y2="115" stroke="#10b981" stroke-width="1.5" marker-end="url(#darr)"/>

    <rect x="240" y="120" width="140" height="50" rx="6" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
    <text x="310" y="140" text-anchor="middle" fill="#14532d" font-weight="600" font-size="12">Metric Matrix</text>
    <text x="310" y="157" text-anchor="middle" fill="#64748b" font-size="10">T = ½(D₀ᵢ + D₀ⱼ − d²ᵢⱼ)</text>

    <!-- Arrow -->
    <line x1="390" y1="105" x2="430" y2="105" stroke="#2563eb" stroke-width="1.5" marker-end="url(#darr)"/>

    <!-- Right: 3D coordinates -->
    <text x="510" y="20" text-anchor="middle" fill="#1e3a5f" font-weight="700" font-size="14">3D Coordinates</text>

    <!-- 3D scatter -->
    <rect x="440" y="30" width="140" height="150" rx="4" fill="#fefce8" stroke="#ca8a04" stroke-width="1"/>
    <!-- Atom positions -->
    <circle cx="475" cy="75" r="5" fill="#2563eb"/>
    <circle cx="520" cy="55" r="5" fill="#2563eb"/>
    <circle cx="540" cy="100" r="5" fill="#ef4444"/>
    <circle cx="490" cy="130" r="5" fill="#2563eb"/>
    <circle cx="555" cy="145" r="5" fill="#2563eb"/>
    <!-- Bonds -->
    <line x1="475" y1="75" x2="520" y2="55" stroke="#94a3b8" stroke-width="1"/>
    <line x1="520" y1="55" x2="540" y2="100" stroke="#94a3b8" stroke-width="1"/>
    <line x1="475" y1="75" x2="490" y2="130" stroke="#94a3b8" stroke-width="1"/>
    <line x1="540" y1="100" x2="555" y2="145" stroke="#94a3b8" stroke-width="1"/>

    <text x="500" y="205" text-anchor="middle" fill="#64748b" font-size="11">Eigendecomposition → positions</text>
  </g>
</svg>
