<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 230" width="900" height="230" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="900" height="230" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">IR Spectroscopy Pipeline — Numerical Hessian (Phase D2)</text>

  <!-- Step 1: Geometry -->
  <rect x="10" y="50" width="110" height="90" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="65" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Geometry</text>
  <text x="65" y="90" text-anchor="middle" font-size="9" fill="#64748b">N atoms</text>
  <text x="65" y="103" text-anchor="middle" font-size="9" fill="#64748b">elements[]</text>
  <text x="65" y="116" text-anchor="middle" font-size="9" fill="#64748b">positions[]</text>
  <text x="65" y="129" text-anchor="middle" font-size="9" fill="#64748b">method: EHT/PM3/xTB</text>
  <line x1="120" y1="95" x2="138" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Numerical Hessian -->
  <rect x="140" y="50" width="130" height="90" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="205" y="73" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">Numerical Hessian</text>
  <text x="205" y="88" text-anchor="middle" font-size="9" fill="#1d4ed8">Central diff. (6N evals)</text>
  <text x="205" y="101" text-anchor="middle" font-size="9" fill="#1d4ed8">H_{ij} = [E(ri+δ,rj+δ) −</text>
  <text x="205" y="114" text-anchor="middle" font-size="9" fill="#1d4ed8"> ... ] / 4δ²</text>
  <text x="205" y="127" text-anchor="middle" font-size="9" fill="#1d4ed8">δ = 0.005 Å (default)</text>
  <line x1="270" y1="95" x2="288" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Mass-weighted -->
  <rect x="290" y="50" width="130" height="90" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="355" y="73" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">Mass-Weighted</text>
  <text x="355" y="88" text-anchor="middle" font-size="9" fill="#15803d">H̃ᵢⱼ = Hᵢⱼ/(√mᵢmⱼ)</text>
  <text x="355" y="101" text-anchor="middle" font-size="9" fill="#15803d">mᵢ: atomic mass (amu)</text>
  <text x="355" y="114" text-anchor="middle" font-size="9" fill="#15803d">H̃ is symmetric</text>
  <text x="355" y="127" text-anchor="middle" font-size="9" fill="#15803d">3N × 3N matrix</text>
  <line x1="420" y1="95" x2="438" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Diagonalization -->
  <rect x="440" y="50" width="130" height="90" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="505" y="73" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">Diagonalization</text>
  <text x="505" y="88" text-anchor="middle" font-size="9" fill="#92400e">H̃·v = λ·v</text>
  <text x="505" y="101" text-anchor="middle" font-size="9" fill="#92400e">ν̃ = √λ / (2πc) cm⁻¹</text>
  <text x="505" y="114" text-anchor="middle" font-size="9" fill="#92400e">6 zero/near-zero modes</text>
  <text x="505" y="127" text-anchor="middle" font-size="9" fill="#92400e">(trans/rot removed)</text>
  <line x1="570" y1="95" x2="588" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Dipole derivatives -->
  <rect x="590" y="50" width="140" height="90" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="660" y="73" text-anchor="middle" font-size="11" font-weight="700" fill="#9d174d">Dipole Derivatives</text>
  <text x="660" y="88" text-anchor="middle" font-size="9" fill="#be185d">dμ/dQₖ ≈ Δμ/Δx(±δ)</text>
  <text x="660" y="101" text-anchor="middle" font-size="9" fill="#be185d">Iᵢᵣ ∝ |dμ/dQₖ|²</text>
  <text x="660" y="114" text-anchor="middle" font-size="9" fill="#be185d">scaled to km/mol</text>
  <text x="660" y="127" text-anchor="middle" font-size="9" fill="#be185d">2δ step for μ</text>
  <line x1="730" y1="95" x2="748" y2="95" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6: IR Spectrum -->
  <rect x="750" y="50" width="130" height="90" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="815" y="73" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">IR Spectrum</text>
  <text x="815" y="88" text-anchor="middle" font-size="9" fill="#6d28d9">Lorentzian broadening</text>
  <text x="815" y="101" text-anchor="middle" font-size="9" fill="#6d28d9">L(x,γ) = γ²/(x²+γ²)</text>
  <text x="815" y="114" text-anchor="middle" font-size="9" fill="#6d28d9">γ = 15 cm⁻¹ default</text>
  <text x="815" y="127" text-anchor="middle" font-size="9" fill="#6d28d9">ZPVE = Σ ½hν (eV)</text>

  <!-- Footer labels -->
  <text x="65"  y="160" text-anchor="middle" font-size="9" fill="#64748b">EHT/PM3/xTB energies</text>
  <text x="205" y="160" text-anchor="middle" font-size="9" fill="#64748b">3N·(3N+1)/2 evals</text>
  <text x="355" y="160" text-anchor="middle" font-size="9" fill="#64748b">m(H)=1, m(C)=12, …</text>
  <text x="505" y="160" text-anchor="middle" font-size="9" fill="#64748b">nalgebra symmetric eig</text>
  <text x="660" y="160" text-anchor="middle" font-size="9" fill="#64748b">charges from EHT/PM3/xTB</text>
  <text x="815" y="160" text-anchor="middle" font-size="9" fill="#64748b">wn_min→wn_max grid</text>

  <!-- Explanation row -->
  <rect x="10" y="178" width="880" height="40" rx="6" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="450" y="196" text-anchor="middle" font-size="10" fill="#3730a3" font-weight="600">Off-diagonal Hessian: H_{ij} = [E(+δᵢ,+δⱼ) − E(+δᵢ,−δⱼ) − E(−δᵢ,+δⱼ) + E(−δᵢ,−δⱼ)] / (4δ²)    Diagonal: H_{ii} = [E(+δ) − 2E₀ + E(−δ)] / δ²</text>
  <text x="450" y="211" text-anchor="middle" font-size="10" fill="#3730a3">Real modes: |ν̃| &gt; 50 cm⁻¹   |   Imaginary modes: ν̃ &lt; 0 (saddle points)   |   3N − 6 vibrational modes (non-linear), 3N − 5 (linear)</text>
</svg>
