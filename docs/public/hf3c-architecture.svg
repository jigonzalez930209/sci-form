<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .hl-box { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .orange-box { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 8; }
      .text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #334155; text-anchor: middle; }
      .title { font-weight: bold; font-size: 15px; fill: #0f172a; }
      .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .arrow { fill: #94a3b8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <rect width="800" height="600" class="bg" />

  <!-- Input -->
  <rect x="50" y="50" width="150" height="60" class="hl-box" />
  <text x="125" y="75" class="text title">Geometry &amp; Setup</text>
  <text x="125" y="95" class="text">MINIX Basis (STO-3G)</text>

  <path d="M 200 80 L 290 80" class="line" marker-end="url(#arrowhead)" />

  <!-- Integrals -->
  <rect x="300" y="30" width="200" height="100" class="box" />
  <text x="400" y="55" class="text title">Integral Engine</text>
  <text x="400" y="75" class="text">Obara-Saika 1e/2e</text>
  <text x="400" y="95" class="text">Overlap (S), Kinetic (T)</text>
  <text x="400" y="115" class="text">Nuclear (V), ERIs (s,p)</text>

  <path d="M 400 130 L 400 180" class="line" marker-end="url(#arrowhead)" />

  <!-- SCF Cycle -->
  <rect x="250" y="190" width="300" height="150" class="hl-box" />
  <text x="400" y="220" class="text title">Self-Consistent Field (SCF)</text>
  
  <text x="325" y="250" class="text">1. Form Density P</text>
  <text x="325" y="270" class="text">2. Form Fock F(P)</text>
  <text x="325" y="290" class="text">3. DIIS Extrapolation</text>
  <text x="325" y="310" class="text">4. Solve F'C = S'CE</text>
  
  <path d="M 430 250 Q 500 250 500 280 Q 500 310 430 310" class="line" marker-end="url(#arrowhead)" />
  <text x="500" y="240" class="text">Iterate until</text>
  <text x="500" y="260" class="text">converged</text>

  <path d="M 400 340 L 400 390" class="line" marker-end="url(#arrowhead)" />

  <!-- Empirical Corrections -->
  <rect x="50" y="400" width="200" height="100" class="orange-box" />
  <text x="150" y="430" class="text title">Empirical Corrections</text>
  <text x="150" y="450" class="text">Grimme D3-BJ (Dispersion)</text>
  <text x="150" y="470" class="text">gCP (Basis Set Error)</text>
  <text x="150" y="490" class="text">SRB (Short-Range Bias)</text>

  <!-- Base Electronic Energy -->
  <rect x="300" y="400" width="200" height="60" class="box" />
  <text x="400" y="425" class="text title">Electronic Energy</text>
  <text x="400" y="445" class="text">1/2 Tr(P(H + F))</text>

  <path d="M 250 430 L 290 430" class="line" marker-end="url(#arrowhead)" />
  <path d="M 500 430 L 590 430" class="line" marker-end="url(#arrowhead)" />

  <!-- Total Energy -->
  <rect x="600" y="400" width="150" height="80" class="hl-box" />
  <text x="675" y="430" class="text title">Total HF-3c Energy</text>
  <text x="675" y="450" class="text">E_el + V_nn +</text>
  <text x="675" y="470" class="text">E_D3 + E_gCP + E_SRB</text>

</svg>
