<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sci-form WebGPU hybrid example</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f4f1e8 0%, #dce5eb 100%);
        color: #1e2c33;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(920px, calc(100vw - 2rem));
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(30, 44, 51, 0.12);
        border-radius: 20px;
        padding: 1.5rem;
        box-shadow: 0 18px 40px rgba(30, 44, 51, 0.12);
        backdrop-filter: blur(10px);
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: #15252c;
        color: #eff7fa;
        padding: 1rem;
        border-radius: 14px;
        overflow: auto;
      }

      h1 {
        margin-top: 0;
        font-size: clamp(1.7rem, 5vw, 2.6rem);
      }

      p {
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>WebGPU + CPU hybrid example</h1>
      <p>
        This page expects the package in <code>../../pkg/</code> to be built with
        <code>./build.sh --web-only --web-features "parallel experimental-gpu"</code>.
      </p>
      <pre id="output">Booting...</pre>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
  </html>
