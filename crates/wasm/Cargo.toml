[package]
name = "sci-form-wasm"
version = "0.1.0"
edition = "2021"
description = "WASM/TypeScript bindings for sci-form 3D conformer generation"

[lib]
crate-type = ["cdylib"]

[dependencies]
sci-form = { path = "../..", default-features = false }
wasm-bindgen = "0.2"
serde_json = "1.0"
getrandom = { version = "0.2", features = ["js"] }

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
