[package]
name = "sci-form-wasm"
version = "0.6.1"
edition = "2021"
description = "WASM/TypeScript bindings for high-performance 3D molecular conformer generation"
license = "MIT"
repository = "https://github.com/jigonzalez930209/sci-form"
readme = "../../README.md"

[lib]
crate-type = ["cdylib"]

[features]
default = []
parallel = ["sci-form/parallel", "wasm-bindgen-rayon"]

[dependencies]
sci-form = { path = "../..", version = "0.6.1", default-features = false }
wasm-bindgen = "0.2"
wasm-bindgen-rayon = { version = "1.3.0", optional = true }
serde_json = "1.0"
js-sys = "0.3"
getrandom = { version = "0.2", features = ["js"] }

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
